<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Grist Ultimate Pivot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.ru.min.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; padding: 0; background-color: white; overflow: hidden;
    }

    /* --- ТУЛБАР --- */
    #toolbar {
      padding: 8px 12px; background: #f7f7f7; border-bottom: 1px solid #e0e0e0;
      display: flex; justify-content: space-between; align-items: center; 
      height: 48px; box-sizing: border-box;
      position: sticky; top: 0; z-index: 1000;
    }
    
    .toolbar-group {
      display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555;
    }

    input[type=range] { width: 90px; cursor: pointer; }
    
    .global-drag {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 10px; height: 26px;
      background: #fff; border: 1px solid #ccc; border-radius: 4px;
      user-select: none; font-size: 12px; font-weight: 600; color: #333;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: background 0.1s;
    }
    #drag-all-cols { cursor: ew-resize; }
    #drag-all-rows { cursor: ns-resize; }
    .global-drag:hover { background: #f0f0f0; }
    .global-drag:active { background: #e0f0ea; border-color: #169366; }
    
    button#toggle-mode {
      background-color: #169366; color: white; border: none; padding: 6px 15px;
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
    }

    /* --- КОНТЕЙНЕР --- */
    #output {
      padding: 10px; 
      overflow: auto; 
      height: calc(100vh - 48px); 
      width: 100vw;
      box-sizing: border-box;
    }

    /* --- ТАБЛИЦА --- */
    .pvtTable { 
      font-size: 13px; 
      border-collapse: collapse; 
      border: 1px solid #ddd;
      table-layout: fixed; 
      width: max-content; 
      transform-origin: top left;
    }

    .pvtTable th, .pvtTable td {
      border: 1px solid #ccc; 
      padding: 5px 8px;
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap;      
      position: relative;
      box-sizing: border-box; 
      min-width: 40px; 
    }
    
    .pvtTable th { background-color: #f2f2f2; font-weight: 600; }

    /* Ресайзеры */
    .resizer-col { position: absolute; top: 0; right: 0; width: 6px; cursor: col-resize; z-index: 20; height: 100%; }
    .resizer-col:hover { border-right: 2px solid #169366; }
    .resizer-row { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; cursor: row-resize; z-index: 20; }
    .resizer-row:hover { border-bottom: 2px solid #169366; }

    /* Режим просмотра (без настроек) */
    .clean-mode .pvtAxisContainer, .clean-mode .pvtRenderer, 
    .clean-mode .pvtAggregator, .clean-mode .pvtAttrDropdown,
    .clean-mode .pvtTriangle, .clean-mode .ui-icon,
    .clean-mode .pvtTopLeft { 
      display: none !important; 
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="toolbar-group">
    <span>🔍</span>
    <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.1" value="1">
    <span id="zoom-val">100%</span>
  </div>

  <div class="toolbar-group">
    <span style="color:#888;">Растянуть:</span>
    <div class="global-drag" id="drag-all-cols">↔ Столбцы</div>
    <div class="global-drag" id="drag-all-rows">↕ Строки</div>
  </div>

  <button id="toggle-mode" onclick="toggleMode()">Настройки</button>
</div>

<div id="output">Загрузка данных...</div>

<script>
  let currentRecords = [];
  let columnLabels = {}; 
  let isViewOnly = false; 
  let currentZoom = 1; 

  // Инициализация Grist
  grist.ready({ requiredAccess: 'full', columns: 'all' });

  // Запрос названий столбцов (красивых имен)
  async function fetchLabels() {
    try {
      const allCols = await grist.docApi.fetchTable('_grist_Tables_column');
      if (allCols && Array.isArray(allCols.colId)) {
        // В Grist API fetchTable возвращает объект со списками, если это системная таблица
        for(let i=0; i < allCols.colId.length; i++) {
          columnLabels[allCols.colId[i]] = allCols.label[i];
        }
      }
    } catch (e) {
      console.warn("Не удалось получить названия столбцов (нужен Full Access):", e);
    }
  }

  // Получение данных
  grist.onRecords(function(records) {
    if (!records || !Array.isArray(records) || records.length === 0) {
      $('#output').text("Данные не найдены. Проверьте настройки Data Selection.");
      return;
    }

    currentRecords = records.map(rec => {
      const cleanRow = {};
      const fields = (typeof rec.toJSON === 'function') ? rec.toJSON() : rec;
      Object.keys(fields).forEach(key => {
        if (key !== 'id' && key !== 'manualSort') {
           const label = columnLabels[key] || key;
           cleanRow[label] = fields[key];
        }
      });
      return cleanRow;
    });

    if (Object.keys(columnLabels).length === 0) {
      fetchLabels().then(renderPivot);
    } else {
      renderPivot();
    }
  });

  function renderPivot() {
    grist.getOption('pivotConfig').then(savedConfig => {
      const config = savedConfig || {};
      if (config.isViewOnly !== undefined) isViewOnly = config.isViewOnly;
      if (config.zoomLevel !== undefined) {
        currentZoom = config.zoomLevel;
        $('#zoom-slider').val(currentZoom);
      }
      
      updateViewMode();

      const ruLocales = $.pivotUtilities.locales.ru;
      
      $("#output").pivotUI(currentRecords, {
        renderers: ruLocales.renderers,
        rendererName: config.rendererName || "Таблица",
        rows: config.rows || [],
        cols: config.cols || [],
        vals: config.vals || [],
        aggregatorName: config.aggregatorName || "Сумма",
        onRefresh: function(cfg) {
          const configToSave = {
            rows: cfg.rows, cols: cfg.cols, 
            rendererName: cfg.rendererName,
            aggregatorName: cfg.aggregatorName, 
            vals: cfg.vals,
            isViewOnly: isViewOnly, 
            zoomLevel: currentZoom 
          };
          grist.setOption('pivotConfig', configToSave);
          
          // Применяем визуальные правки после рендеринга
          setTimeout(() => { 
            initIndividualResizing(); 
            applyZoom(); 
          }, 100);
        }
      }, true, "ru");
    });
  }

  // Управление масштабом
  $('#zoom-slider').on('input', function() {
    currentZoom = parseFloat($(this).val());
    applyZoom();
  });

  $('#zoom-slider').on('change', function() {
    grist.getOption('pivotConfig').then(config => {
      const newConfig = config || {};
      newConfig.zoomLevel = currentZoom;
      grist.setOption('pivotConfig', newConfig);
    });
  });

  function applyZoom() {
    $('#zoom-val').text(Math.round(currentZoom * 100) + '%');
    $('.pvtTable').css('transform', `scale(${currentZoom})`);
  }

  function toggleMode() {
    isViewOnly = !isViewOnly;
    updateViewMode();
    grist.getOption('pivotConfig').then(config => {
      const newConfig = config || {};
      newConfig.isViewOnly = isViewOnly;
      grist.setOption('pivotConfig', newConfig);
    });
  }

  function updateViewMode() {
    const btn = document.getElementById('toggle-mode');
    if (isViewOnly) {
      $('#output').addClass('clean-mode');
      btn.innerText = "Настройки";
      btn.style.backgroundColor = "#888";
    } else {
      $('#output').removeClass('clean-mode');
      btn.innerText = "Готово";
      btn.style.backgroundColor = "#169366";
    }
  }

  // --- ЛОГИКА РЕСАЙЗА ---
  function initIndividualResizing() {
    const allCells = document.querySelectorAll('.pvtTable th, .pvtTable td');
    allCells.forEach(cell => {
      if (cell.querySelector('.resizer-col')) return;

      const colResizer = document.createElement('div');
      colResizer.classList.add('resizer-col');
      cell.appendChild(colResizer);
      setupColResizer(cell, colResizer);

      const rowResizer = document.createElement('div');
      rowResizer.classList.add('resizer-row');
      cell.appendChild(rowResizer);
      setupRowResizer(cell, rowResizer);
    });
  }

  function setupColResizer(cell, resizer) {
    let startX, startW;
    resizer.addEventListener('mousedown', e => {
      startX = e.clientX; startW = cell.offsetWidth;
      const onMove = ev => {
        const newW = startW + (ev.clientX - startX) / currentZoom;
        cell.style.width = newW + 'px';
        cell.style.maxWidth = newW + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  function setupRowResizer(cell, resizer) {
    let startY, startH;
    resizer.addEventListener('mousedown', e => {
      startY = e.clientY; startH = cell.offsetHeight;
      const onMove = ev => {
        const newH = startH + (ev.clientY - startY) / currentZoom;
        cell.parentElement.style.height = newH + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // Глобальное растягивание
  document.getElementById('drag-all-cols').addEventListener('mousedown', e => {
    let startX = e.clientX;
    const onMove = ev => {
      const dx = (ev.clientX - startX) / currentZoom;
      $('.pvtTable th').each(function() {
        const newW = $(this).width() + dx;
        $(this).css({'width': newW, 'max-width': newW});
      });
      startX = ev.clientX;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  document.getElementById('drag-all-rows').addEventListener('mousedown', e => {
    let startY = e.clientY;
    const onMove = ev => {
      const dy = (ev.clientY - startY) / currentZoom;
      $('.pvtTable tr').each(function() {
        const newH = $(this).height() + dy;
        $(this).css('height', newH);
      });
      startY = ev.clientY;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

</script>

</body>
</html>
