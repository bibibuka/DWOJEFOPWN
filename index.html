    function captureAndSaveDerivedColumnWidths() {
      const table = getDerivedPivotTable();
      if (!table) return;

      const widths = getTableColumnWidths(table);
      if (!widths.length) return;

      savedDerivedColumnWidths = widths;
      lsSave('derivedColumnWidths', widths);
    }

    function captureAndSaveRowHeights() {
      const table = getMainPivotTable();
      if (!table) return;
      const rows = Array.from(table.querySelectorAll('tr'));
      const heights = rows.map(tr => Math.round(tr.getBoundingClientRect().height / currentZoom));
      savedRowHeights = heights;
      lsSave('rowHeights', heights);
    }

    function captureAndSaveDerivedRowHeights() {
      const table = getDerivedPivotTable();
      if (!table) return;

      const rows = Array.from(table.querySelectorAll('tr'));
      const heights = rows.map(tr => Math.round(tr.getBoundingClientRect().height / currentZoom));
      savedDerivedRowHeights = heights;
      lsSave('derivedRowHeights', heights);
    }

    function restoreSavedDerivedSizes(options = {}) {
      const table = getDerivedPivotTable();
      if (!table) return;

      const { columns = true, rows = true } = options;

      if (columns && Array.isArray(savedDerivedColumnWidths) && savedDerivedColumnWidths.length) {
        const allRows = Array.from(table.querySelectorAll('tr'));
        for (const tr of allRows) {
          const cells = Array.from(tr.children);
          cells.forEach((c, idx) => {
            const w = savedDerivedColumnWidths[idx];
            if (Number.isFinite(w) && w > 20) {
              c.style.width = `${w}px`;
              c.style.minWidth = `${w}px`;
              c.style.maxWidth = `${w}px`;
            }
          });
        }
      }

      if (rows && Array.isArray(savedDerivedRowHeights) && savedDerivedRowHeights.length) {
        const rows = Array.from(table.querySelectorAll('tr'));
        rows.forEach((tr, idx) => {
          const h = savedDerivedRowHeights[idx];
          if (Number.isFinite(h) && h > 16) {
            tr.style.height = `${h}px`;
            Array.from(tr.children).forEach(c => c.style.height = `${h}px`);
          }
        });
      }
    }

    function restoreSavedSizes() {
      const table = getMainPivotTable();
      if (!table) return;

      // Ширины: применяем к самой широкой строке и ко всем ячейкам с тем же индексом в других строках.
      if (Array.isArray(savedColumnWidths) && savedColumnWidths.length) {
        const allRows = Array.from(table.querySelectorAll('tr'));
        for (const tr of allRows) {
          const cells = Array.from(tr.children);
          cells.forEach((c, idx) => {
            const w = savedColumnWidths[idx];
            if (Number.isFinite(w) && w > 20) {
              c.style.width = `${w}px`;
              c.style.minWidth = `${w}px`;
              c.style.maxWidth = `${w}px`;
            }
          });
        }
      }

      if (Array.isArray(savedRowHeights) && savedRowHeights.length) {
        const rows = Array.from(table.querySelectorAll('tr'));
        rows.forEach((tr, idx) => {
          const h = savedRowHeights[idx];
          if (Number.isFinite(h) && h > 16) {
            tr.style.height = `${h}px`;
            Array.from(tr.children).forEach(c => c.style.height = `${h}px`);
          }
        });
      }

      syncSecondaryTableWidthsFromMain();
    }

    function normalizeVisibleHeaderText(text) {
      return String(text ?? '')
        .replace(/[↗▾]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getPivotLeafHeaderCells(rendererArea) {
      if (!rendererArea) return [];
      const pivotTable = rendererArea.querySelector('.pvtTable:not(.derivedTable)');
      if (!pivotTable) return [];

      const headRows = Array.from(pivotTable.querySelectorAll('thead tr'));
      if (!headRows.length) return [];

      let bestCells = [];
      for (const row of headRows) {
        const cells = Array.from(row.querySelectorAll('th.pvtColLabel'));
        if (cells.length > bestCells.length) {
          bestCells = cells;
        }
      }

      return bestCells || [];
    }

    function reorderDerivedResultByIndices(result, indices) {
      if (!result || !Array.isArray(indices) || !indices.length) return result;

      return {
        ...result,
        colLabels: indices.map(i => result.colLabels[i]),
        colKeys: indices.map(i => result.colKeys[i]),
        colCount: indices.length,
        metrics: result.metrics.map(metric => ({
          ...metric,
          values: indices.map(i => metric.values[i])
        }))
      };
    }

    function reorderDerivedResultToRenderer(result, rendererArea) {
      if (!result) return result;

      const leafCells = getPivotLeafHeaderCells(rendererArea);
      if (!leafCells.length) return result;

      const domLabels = leafCells.map(cell => normalizeVisibleHeaderText(cell.textContent));

      const nonTotalIndices = [];
      let totalIndex = null;

      result.colLabels.forEach((label, idx) => {
        const n = normalizeLabel(label);
        if (n === 'ИТОГО' || n === 'TOTALS') {
          totalIndex = idx;
        } else {
          nonTotalIndices.push(idx);
        }
      });

      const buckets = new Map();
      nonTotalIndices.forEach(idx => {
        const key = normalizeVisibleHeaderText(result.colLabels[idx]);
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(idx);
      });

      const orderedIndices = [];

      domLabels.forEach(label => {
        const queue = buckets.get(label);
        if (queue && queue.length) {
          orderedIndices.push(queue.shift());
        }
      });

      for (const queue of buckets.values()) {
        while (queue.length) orderedIndices.push(queue.shift());
      }

      if (totalIndex != null) orderedIndices.push(totalIndex);

      if (!orderedIndices.length) return result;
      return reorderDerivedResultByIndices(result, orderedIndices);
    }

    // -----------------------------
    // LAYOUT
    // -----------------------------
    function getMainTableLayoutHints(expectedCols) {
      let labelWidth = isViewOnly ? 260 : 370;
      let dataWidths = Array(expectedCols).fill(80);

      const rendererArea = getMainRendererArea();
      if (!rendererArea) return { labelWidth, dataWidths };

      const mainTable = rendererArea.querySelector('.pvtTable:not(.derivedTable)');
      if (!mainTable) return { labelWidth, dataWidths };

      const mainLeftBlockWidth = getMainLeftBlockWidth(mainTable);
      if (Number.isFinite(mainLeftBlockWidth) && mainLeftBlockWidth > 20) {
        labelWidth = Math.max(labelWidth, mainLeftBlockWidth);
      }

      const bodyRows = Array.from(mainTable.querySelectorAll('tbody tr'));
      if (!bodyRows.length) return { labelWidth, dataWidths };

      let refTds = [];
      const totalRow = bodyRows.find(tr =>
        tr.querySelector('th.pvtTotalLabel') ||
        [...tr.querySelectorAll('th')].some(th => normalizeLabel(th.textContent) === 'ИТОГО')
      );

      if (totalRow) {
        refTds = Array.from(totalRow.querySelectorAll('td'));
      }

      if (!refTds.length) {
        const firstDataRow = bodyRows.find(tr => tr.querySelectorAll('td').length > 0);
        if (firstDataRow) refTds = Array.from(firstDataRow.querySelectorAll('td'));
      }

      if (refTds.length) {
        dataWidths = refTds.map(td => td.getBoundingClientRect().width / currentZoom);
      }

      if (dataWidths.length < expectedCols) {
        while (dataWidths.length < expectedCols) {
          dataWidths.push(dataWidths[dataWidths.length - 1] || 80);
        }
      } else if (dataWidths.length > expectedCols) {
        dataWidths = dataWidths.slice(0, expectedCols);
      }

      return { labelWidth, dataWidths };
    }

    function syncSecondaryTableWidthsFromMain(options = {}) {
      const wrap = document.getElementById('secondary-table-wrap');
      if (!wrap) return;

      const { linkColumns = areTablesWidthLinked } = options;

      const derivedTable = wrap.querySelector('.derivedTable');
      if (!derivedTable) return;

      const firstMetricRow = derivedTable.querySelector('tbody tr');
      if (!firstMetricRow) return;

      const expectedCols = firstMetricRow.querySelectorAll('td.metric-val').length;
      const { labelWidth: mainLabelWidth, dataWidths } = getMainTableLayoutHints(expectedCols);
      const labelWidth = linkColumns
        ? getLinkedLabelWidth(mainLabelWidth)
        : mainLabelWidth;

      derivedTable.querySelectorAll('th.metric-header-corner, th.metric-label').forEach(th => {
        th.style.width = `${labelWidth}px`;
        th.style.minWidth = `${labelWidth}px`;
        th.style.maxWidth = `${labelWidth}px`;
      });

      derivedTable.querySelectorAll('th.metric-col-header').forEach((th, idx) => {
        const w = dataWidths[idx] || 80;
        th.style.width = `${w}px`;
        th.style.minWidth = `${w}px`;
        th.style.maxWidth = `${w}px`;
      });

      derivedTable.querySelectorAll('tbody tr').forEach(tr => {
        tr.querySelectorAll('td.metric-val').forEach((td, idx) => {
          const w = dataWidths[idx] || 80;
          td.style.width = `${w}px`;
          td.style.minWidth = `${w}px`;
          td.style.maxWidth = `${w}px`;
        });
      });

      if (linkColumns) {
        applyMainLeftBlockWidth(getMainPivotTable(), labelWidth);
      }

      restoreSavedDerivedSizes({ columns: !linkColumns, rows: true });
    }

    // -----------------------------
    // РЕНДЕР KPI-ТАБЛИЦЫ
    // -----------------------------
    function renderDerivedMetricsTable(result, rendererArea) {
      if (!rendererArea) return;

      const old = rendererArea.querySelector('#secondary-table-wrap');
      if (old) old.remove();

      if (!result) return;

      const { metrics, colCount, colLabels } = result;
      const layoutHints = getMainTableLayoutHints(colCount);
      const dataWidths = layoutHints.dataWidths;
      const labelWidth = areTablesWidthLinked
        ? getLinkedLabelWidth(layoutHints.labelWidth)
        : layoutHints.labelWidth;

      const wrap = document.createElement('div');
      wrap.id = 'secondary-table-wrap';

      const table = document.createElement('table');
      table.className = 'pvtTable derivedTable';

      const thead = document.createElement('thead');
      const headTr = document.createElement('tr');

      const cornerTh = document.createElement('th');
      cornerTh.className = 'metric-header-corner';
      cornerTh.textContent = '';
      cornerTh.style.width = `${labelWidth}px`;
      cornerTh.style.minWidth = `${labelWidth}px`;
      cornerTh.style.maxWidth = `${labelWidth}px`;
      headTr.appendChild(cornerTh);

      colLabels.forEach((label, idx) => {
        const th = document.createElement('th');
        th.className = 'metric-col-header pvtColLabel';
        th.textContent = label;

        const w = dataWidths[idx] || 80;
        th.style.width = `${w}px`;
        th.style.minWidth = `${w}px`;
        th.style.maxWidth = `${w}px`;

        headTr.appendChild(th);
      });

      thead.appendChild(headTr);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      metrics.forEach(metric => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-metric-key', metric.key);
        const target = getMetricTarget(metric.key);

        const th = document.createElement('th');
        th.className = 'metric-label pvtRowLabel';
        th.style.width = `${labelWidth}px`;
        th.style.minWidth = `${labelWidth}px`;
        th.style.maxWidth = `${labelWidth}px`;

        const inner = document.createElement('div');
        inner.className = 'metric-label-inner';

        const textSpan = document.createElement('span');
        textSpan.className = 'metric-label-text';
        textSpan.textContent = metric.label;

        const targetBox = document.createElement('span');
        targetBox.className = 'metric-target-box';
        targetBox.title = 'Введите %, около которого показатель должен становиться зелёным';

        const prefix = document.createElement('span');
        prefix.className = 'metric-target-prefix';
        prefix.textContent = '🟢';

        const input = document.createElement('input');
        input.className = 'metric-target-input';
        input.type = 'text';
        input.inputMode = 'decimal';
        input.value = formatTargetInputValue(target);
        input.title = 'Например: 40 = зелёный около 40%';
        input.addEventListener('change', () => handleMetricTargetCommit(metric.key, input));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            input.blur();
          }
        });

        const suffix = document.createElement('span');
        suffix.className = 'metric-target-suffix';
        suffix.textContent = '%';

        targetBox.appendChild(prefix);
        targetBox.appendChild(input);
        targetBox.appendChild(suffix);

        inner.appendChild(textSpan);
        inner.appendChild(targetBox);
        th.appendChild(inner);
        tr.appendChild(th);

        metric.values.forEach((val, idx) => {
          const td = document.createElement('td');
          td.className = 'metric-val';
          td.textContent = formatPercentRU(val, metric.digits);

          const w = dataWidths[idx] || 80;
          td.style.width = `${w}px`;
          td.style.minWidth = `${w}px`;
          td.style.maxWidth = `${w}px`;

          if (val == null || !Number.isFinite(val)) {
            td.classList.add('metric-na');
          } else {
            td.style.backgroundColor = getHeatColorByTarget(val, target);
            td.style.color = '#fff';
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrap.appendChild(table);
      rendererArea.appendChild(wrap);
    }

    // -----------------------------
    // DRILLDOWN
    // -----------------------------
    function openDrilldownView(sourceColLabel, sourceColFields, sourceColKey) {
      currentDrilldown = {
        sourceColLabel,
        sourceColFields: Array.isArray(sourceColFields) ? [...sourceColFields] : [],
        sourceColKey: Array.isArray(sourceColKey) ? [...sourceColKey] : []
      };
      scheduleRender();
    }

    function exitDrilldownView() {
      currentDrilldown = null;
      scheduleRender();
    }

    function injectDrillButtonsIntoMainPivotHeaders() {
      if (currentDrilldown) return;
      if (!currentDerivedResult) return;
      if (!mappedRecords.length) return;

      const fields = Object.keys(mappedRecords[0] || {});
      const dateField = findBestDateField(fields, mappedRecords);
      if (!dateField) return;

      const rendererArea = getMainRendererArea();
      const leafCells = getPivotLeafHeaderCells(rendererArea);
      if (!leafCells.length) return;

      const nonTotalIndices = currentDerivedResult.colLabels
        .map((label, idx) => ({ label, idx }))
        .filter(x => {
          const n = normalizeLabel(x.label);
          return n !== 'ИТОГО' && n !== 'TOTALS';
        })
        .map(x => x.idx);

      const pairCount = Math.min(leafCells.length, nonTotalIndices.length);
      if (!pairCount) return;

      for (let i = 0; i < pairCount; i++) {
        const cell = leafCells[i];
        const resultIdx = nonTotalIndices[i];
        const colKey = currentDerivedResult.colKeys[resultIdx];
        const label = currentDerivedResult.colLabels[resultIdx];

        if (cell.querySelector('.pivot-drill-btn')) continue;

        const hasNullInside = Array.isArray(colKey) && colKey.some(v => v == null || v === '');
        const canDrill =
          Array.isArray(colKey) &&
          colKey.length > 0 &&
          !hasNullInside &&
          normalizeLabel(label) !== 'NULL';

        if (!canDrill) continue;

        const rawText = normalizeVisibleHeaderText(cell.textContent) || label;

        cell.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'pivot-col-header-inner';

        const text = document.createElement('span');
        text.className = 'pivot-col-header-text';
        text.textContent = rawText;

        const btn = document.createElement('button');
        btn.className = 'pivot-drill-btn';
        btn.type = 'button';
        btn.textContent = '↗';
        btn.title = 'Открыть эту неделю по датам';
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          openDrilldownView(label, currentDerivedResult.colFields, colKey);
        });

        wrap.appendChild(text);
        wrap.appendChild(btn);
        cell.appendChild(wrap);
      }
    }

    // -----------------------------
    // FORCE RELOAD
    // -----------------------------
    async function forceReloadFromGrist(reason = "") {
      if (reloadInFlight) return;
      // Не дёргаем UI, пока пользователь взаимодействует — иначе размеры/ввод «слетают».
      if (isInteractingNow()) {
        pendingDataReload = true;
        return;
      }
      reloadInFlight = true;
      try {
        const rows = await grist.fetchSelectedTable({ format: "rows", includeColumns: "normal" });
        const incoming = rows || [];
        const newHash = computeRecordsHash(incoming);
        if (newHash === lastRenderedDataHash && rawRecords && rawRecords.length === incoming.length) {
          rawRecords = incoming;
          return; // ничего не меняем — сохраняем ручную подобранные размеры
        }
        rawRecords = incoming;
        lastDataStamp = Date.now();
        scheduleRender();
      } catch (e) {
        console.warn("forceReloadFromGrist failed", reason, e);
      } finally {
        reloadInFlight = false;
      }
    }

    setTimeout(() => forceReloadFromGrist("startup"), 0);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) setTimeout(() => forceReloadFromGrist("visibilitychange"), 50);
    });

    window.addEventListener("focus", () => setTimeout(() => forceReloadFromGrist("focus"), 50));

    setInterval(() => {
      if (document.hidden) return;
      const pivotExists = !!document.querySelector('#output .pvtTable');
      if (!pivotExists) forceReloadFromGrist("watchdog_missing_pivot");
    }, 5000);

    // -----------------------------
    // ЗУМ
    // -----------------------------
    $('#zoom-slider').on('input', async function () {
      currentZoom = parseFloat($(this).val());
      applyZoom();

      const key = await getConfigKeyForCurrentTable();
      const config = (await grist.getOption(key)) || {};
      config.zoomLevel = currentZoom;
      await grist.setOption(key, config);
    });

    function applyZoom() {
      $('#zoom-val').text(Math.round(currentZoom * 100) + '%');
      $('.pvtTable').css('zoom', currentZoom);
    }

    // -----------------------------
    // РЕЖИМ "НАСТРОЙКИ/ЧИСТО"
    // -----------------------------
    async function toggleMode() {
      isViewOnly = !isViewOnly;
      updateViewMode();

      const key = await getConfigKeyForCurrentTable();
      const config = (await grist.getOption(key)) || {};
      config.isViewOnly = isViewOnly;
      await grist.setOption(key, config);

      scheduleRender();
    }

    function updateViewMode() {
      const btn = document.getElementById('toggle-mode');
      const container = document.getElementById('output');

      if (isViewOnly) {
        container.classList.add('clean-mode');
        btn.innerText = "Настройки";
        btn.style.backgroundColor = "#888";
      } else {
        container.classList.remove('clean-mode');
        btn.innerText = "Готово (Скрыть)";
        btn.style.backgroundColor = "#169366";
      }
    }

    // -----------------------------
    // AGGREGATORS
    // -----------------------------
    function buildAggregators(fields) {
      const tpl = $.pivotUtilities.aggregators;
      const intFormatter = $.pivotUtilities.numberFormat({ digitsAfterDecimal: 0 });
      const countaField = findFieldByAliases(fields, COUNTA_FIELD_ALIASES);

      const myAggregators = {
        "Количество":            tpl["Count"],
        "Количество уникальных": tpl["Count Unique Values"],
        "Кол-во по всему":       tpl["Count as Fraction of Total"],
        "Кол-во по строке":      tpl["Count as Fraction of Rows"],
        "Кол-во по столбцу":     tpl["Count as Fraction of Columns"]
      };

      if (countaField) {
        myAggregators[`COUNTA по ${countaField}`] = makeCountaAggregatorForField(countaField, intFormatter);
      }

      return myAggregators;
    }

    // -----------------------------
    // MAIN VIEW
    // -----------------------------
    function postRenderEnhanceMain() {
      initIndividualResizing();

      let result = buildDerivedMetricsFromRecords(mappedRecords, currentPivotConfig);
      result = reorderDerivedResultToRenderer(result, getMainRendererArea());

      currentDerivedResult = result;
      renderDerivedMetricsTable(result, getMainRendererArea());

      syncSecondaryTableWidthsFromMain();
      injectDrillButtonsIntoMainPivotHeaders();
      initIndividualResizing();
      restoreSavedSizes();
      applyZoom();
    }

    function renderMainView(currentRecords, key, myAggregators) {
      const ruLocales = $.pivotUtilities.locales.ru;

      const options = {
        renderers: ruLocales.renderers,
        aggregators: myAggregators,

        rendererName: currentPivotConfig.rendererName,
        aggregatorName: currentPivotConfig.aggregatorName,

        rows: currentPivotConfig.rows,
        cols: currentPivotConfig.cols,
        vals: currentPivotConfig.vals,

        inclusions: currentPivotConfig.inclusions,
        exclusions: currentPivotConfig.exclusions,

        unusedAttrsVertical: false,

        onRefresh: function(cfg) {
          let refreshedAggregatorName = cfg.aggregatorName || "Количество";
          if (!myAggregators[refreshedAggregatorName]) {
            refreshedAggregatorName = "Количество";
          }

          currentPivotConfig = {
            rows: cfg.rows || [],
            cols: cfg.cols || [],
            vals: cfg.vals || [],
            inclusions: cfg.inclusions || {},
            exclusions: cfg.exclusions || {},
            rendererName: cfg.rendererName || "Таблица",
            aggregatorName: refreshedAggregatorName
          };

          const configToSave = {
            rows: currentPivotConfig.rows,
            cols: currentPivotConfig.cols,
            vals: currentPivotConfig.vals,
            rendererName: currentPivotConfig.rendererName,
            aggregatorName: currentPivotConfig.aggregatorName,
            inclusions: currentPivotConfig.inclusions,
            exclusions: currentPivotConfig.exclusions,
            isViewOnly: isViewOnly,
            areTablesWidthLinked: areTablesWidthLinked,
            zoomLevel: currentZoom,
            metricTargets: currentMetricTargets
          };

          grist.setOption(key, configToSave);

          setTimeout(() => postRenderEnhanceMain(), 200);
        }
      };

      $("#output").empty().pivotUI(currentRecords, options, true);
      // Применяем сохранённые размеры сразу (без видимого скачка), а потом ещё раз после дорисовки.
      restoreSavedSizes();
      setTimeout(() => postRenderEnhanceMain(), 200);
    }

    // -----------------------------
    // DETAIL VIEW
    // -----------------------------
    function renderDetailView(currentRecords, fields, myAggregators) {
      const dateField = findBestDateField(fields, currentRecords);

      $("#output").empty();

      const root = document.createElement('div');
      root.id = 'detail-view-root';
      root.classList.add('detail-mode');

      const backbar = document.createElement('div');
      backbar.id = 'detail-backbar';

      const backBtn = document.createElement('button');
      backBtn.id = 'detail-back-btn';
      backBtn.type = 'button';
      backBtn.textContent = '← Вернуться к неделям';
      backBtn.addEventListener('click', exitDrilldownView);

      const titleWrap = document.createElement('div');
      titleWrap.className = 'detail-title-wrap';

      const title = document.createElement('div');
      title.id = 'detail-title';
      title.textContent = `Неделя: ${currentDrilldown?.sourceColLabel || '—'}`;

      const subtitle = document.createElement('div');
      subtitle.id = 'detail-subtitle';
      subtitle.textContent = dateField
        ? `Детализация по датам (${dateField})`
        : 'Не найдено поле даты для детализации';

      titleWrap.appendChild(title);
      titleWrap.appendChild(subtitle);

      backbar.appendChild(backBtn);
      backbar.appendChild(titleWrap);

      const rendererArea = document.createElement('div');
      rendererArea.className = 'pvtRendererArea';

      root.appendChild(backbar);
      root.appendChild(rendererArea);
      document.getElementById('output').appendChild(root);

      if (!dateField) {
        const msg = document.createElement('div');
        msg.className = 'detail-empty-msg';
        msg.textContent = 'Не удалось определить поле даты, поэтому раскрытие недели по дням недоступно.';
        rendererArea.appendChild(msg);
        applyZoom();
        return;
      }

      const filteredRecords = currentRecords.filter(rec =>
        recordMatchesPivotFilters(rec, currentPivotConfig) &&
        recordMatchesKeyArray(rec, currentDrilldown.sourceColFields, currentDrilldown.sourceColKey)
      );

      if (!filteredRecords.length) {
        const msg = document.createElement('div');
        msg.className = 'detail-empty-msg';
        msg.textContent = 'Нет данных для выбранной недели.';
        rendererArea.appendChild(msg);
        applyZoom();
        return;
      }

      const detailPivotOptions = {
        renderers: $.pivotUtilities.locales.ru.renderers,
        aggregators: myAggregators,
        rendererName: currentPivotConfig.rendererName,
        aggregatorName: currentPivotConfig.aggregatorName,
        rows: currentPivotConfig.rows,
        cols: [dateField],
        vals: currentPivotConfig.vals
      };

      $(rendererArea).pivot(filteredRecords, detailPivotOptions);

      let detailResult = buildDerivedMetricsGrouped(
        currentRecords,
        currentPivotConfig,
        [dateField],
        rec => recordMatchesKeyArray(rec, currentDrilldown.sourceColFields, currentDrilldown.sourceColKey)
      );

      detailResult = reorderDerivedResultToRenderer(detailResult, rendererArea);

      currentDerivedResult = detailResult;
      renderDerivedMetricsTable(detailResult, rendererArea);

      setTimeout(() => {
        initIndividualResizing();
        syncSecondaryTableWidthsFromMain();
        initIndividualResizing();
        applyZoom();
      }, 80);
    }

    // -----------------------------
    // RENDER
    // -----------------------------
    async function renderPivot() {
      renderInProgress = true;

      try {
        await ensureTableContextUpToDate();

        if (!rawRecords || rawRecords.length === 0) {
          $('#output').text("Нет данных.");
          return;
        }

        const currentRecords = mapRecordsWithLabels(rawRecords);
        mappedRecords = currentRecords;

        const fields = currentRecords.length ? Object.keys(currentRecords[0]) : [];

        const key = await getConfigKeyForCurrentTable();
        const savedConfig = (await grist.getOption(key)) || {};

        if (savedConfig.isViewOnly !== undefined) isViewOnly = savedConfig.isViewOnly;
        if (savedConfig.zoomLevel !== undefined) {
          currentZoom = savedConfig.zoomLevel;
          $('#zoom-slider').val(currentZoom);
        }

        areTablesWidthLinked = normalizeLinkedWidthsFlag(savedConfig.areTablesWidthLinked);

        currentMetricTargets = normalizeMetricTargets(savedConfig.metricTargets);

        // Локальные (per-user) цели имеют приоритет над общими из grist.setOption.
        const localTargets = lsLoad('metricTargets');
        if (localTargets && typeof localTargets === 'object') {
          currentMetricTargets = normalizeMetricTargets(localTargets);
        }

        const localLinkedWidths = lsLoad('linkedWidths');
        if (typeof localLinkedWidths === 'boolean') {
          areTablesWidthLinked = localLinkedWidths;
        }

        // Восстанавливаем сохранённые пользователем размеры
        savedColumnWidths = lsLoad('columnWidths') || [];
        savedRowHeights = lsLoad('rowHeights') || [];
        savedDerivedColumnWidths = lsLoad('derivedColumnWidths') || [];
        savedDerivedRowHeights = lsLoad('derivedRowHeights') || [];

        updateViewMode();
        updateLinkWidthsButton();

        const myAggregators = buildAggregators(fields);
        const safeConfig = sanitizeConfig(savedConfig, fields);

        let resolvedAggregatorName = safeConfig.aggregatorName || "Количество";
        if (!myAggregators[resolvedAggregatorName]) {
          resolvedAggregatorName = "Количество";
        }

        currentPivotConfig = {
          rows: safeConfig.rows || [],
          cols: safeConfig.cols || [],
          vals: safeConfig.vals || [],
          inclusions: safeConfig.inclusions || {},
          exclusions: safeConfig.exclusions || {},
          rendererName: safeConfig.rendererName || "Таблица",
          aggregatorName: resolvedAggregatorName
        };

        if (currentDrilldown) {
          renderDetailView(currentRecords, fields, myAggregators);
        } else {
          renderMainView(currentRecords, key, myAggregators);
        }

        lastRenderedDataHash = computeRecordsHash(rawRecords);

      } catch (e) {
        console.error(e);
        $('#output').text("Ошибка рендера: " + (e?.message || e));
      } finally {
        renderInProgress = false;
        if (renderPending) {
          renderPending = false;
          scheduleRender();
        }
      }
    }

    // -----------------------------
    // GRIST
    // -----------------------------
    grist.onRecords(function(records) {
      // Если пользователь сейчас тянет форму таблицы или печатает цель —
      // откладываем входящие данные, чтобы не рвать рисунок.
      const incoming = records || [];

      // Если данные реально не изменились — не ререндерим.
      // Это ключевое: Grist присылает «тики» часто, и раньше это сбрасывало
      // вручную подобранные размеры.
      const newHash = computeRecordsHash(incoming);
      if (newHash === lastRenderedDataHash && rawRecords && rawRecords.length === incoming.length) {
        rawRecords = incoming;
        return;
      }

      rawRecords = incoming;
      lastDataStamp = Date.now();
      if (isInteractingNow()) {
        pendingScheduleRender = true;
        return;
      }
      scheduleRender();
    }, { format: "rows", includeColumns: "normal" });

    // -----------------------------
    // ГЛОБАЛЬНОЕ РАСТЯГИВАНИЕ
    // -----------------------------
    function setupGlobalResizers() {
      const dragCols = document.getElementById('drag-all-cols');
      const dragRows = document.getElementById('drag-all-rows');

      dragCols.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isUserDragging = true;
        const startX = e.clientX;

        const mainTable = getMainPivotTable();
        const derivedTable = getDerivedPivotTable();
        const initialMainWidths = getTableColumnWidths(mainTable);
        const initialDerivedWidths = getTableColumnWidths(derivedTable);

        const onMouseMove = (ev) => {
          const dx = (ev.clientX - startX) / currentZoom;

          if (initialMainWidths.length) {
            const nextMainWidths = initialMainWidths.map(w => Math.max(30, w + dx));
            applyColumnWidthsToTable(mainTable, nextMainWidths);
          }

          if (initialDerivedWidths.length) {
            const nextDerivedWidths = initialDerivedWidths.map(w => Math.max(30, w + dx));
            applyColumnWidthsToTable(derivedTable, nextDerivedWidths);
          } else if (areTablesWidthLinked) {
            syncSecondaryTableWidthsFromMain({ linkColumns: true });
          }

          if (areTablesWidthLinked && initialDerivedWidths.length) {
            const linkedFirstWidth = Math.max(30, initialDerivedWidths[0] + dx);
            applyMainLeftBlockWidth(mainTable, linkedFirstWidth);
            applyFirstColumnWidth(derivedTable, linkedFirstWidth);
          }
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
          captureAndSaveColumnWidths();
          captureAndSaveDerivedColumnWidths();

          if (areTablesWidthLinked) {
            syncSecondaryTableWidthsFromMain({ linkColumns: true });
          }

          isUserDragging = false;
          flushPendingAfterInteraction();
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.cursor = 'ew-resize';
      });

      dragRows.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isUserDragging = true;
        const startY = e.clientY;
        const rows = document.querySelectorAll('.pvtTable tr');
        const initialHeights = Array.from(rows).map(tr => tr.getBoundingClientRect().height / currentZoom);

        const onMouseMove = (ev) => {
          const dy = (ev.clientY - startY) / currentZoom;
          rows.forEach((tr, idx) => {
            const newH = Math.max(20, initialHeights[idx] + dy);
            tr.style.height = `${newH}px`;
            Array.from(tr.children).forEach(child => child.style.height = `${newH}px`);
          });
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
          captureAndSaveRowHeights();
          captureAndSaveDerivedRowHeights();
          isUserDragging = false;
          flushPendingAfterInteraction();
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.cursor = 'ns-resize';
      });
    }
    setupGlobalResizers();

    // -----------------------------
    // ИНДИВИДУАЛЬНЫЕ РЕСАЙЗЕРЫ
    // -----------------------------
    function initIndividualResizing() {
      const headers = document.querySelectorAll('.pvtTable th');
      headers.forEach(th => {
        th.style.maxWidth = 'none';
        const realWidth = th.getBoundingClientRect().width;
        const cssWidth = realWidth / currentZoom;

        th.style.width = `${cssWidth}px`;
        th.style.minWidth = '30px';
        th.style.maxWidth = `${cssWidth}px`;
      });

      const allCells = document.querySelectorAll(
        '.pvtTable th, .pvtTable .pvtRowLabel, .pvtTable .pvtColLabel, .derivedTable td.metric-val'
      );

      allCells.forEach(cell => {
        if (cell.querySelector('.resizer-col')) return;

        const colResizer = document.createElement('div');
        colResizer.classList.add('resizer-col');
        cell.appendChild(colResizer);
        setupColResizer(cell, colResizer);

        const rowResizer = document.createElement('div');
        rowResizer.classList.add('resizer-row');
        cell.appendChild(rowResizer);
        setupRowResizer(cell, rowResizer);
      });
    }

    function setupColResizer(cell, resizer) {
      let startX = 0, startW = 0;
      let isDerived = false;

      const onMouseDown = (e) => {
        e.stopPropagation();
        isUserDragging = true;
        startX = e.clientX;
        startW = cell.getBoundingClientRect().width / currentZoom;

        const table = cell.closest('table');
        isDerived = !!(table && table.classList.contains('derivedTable'));

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        resizer.style.borderRight = '2px solid #169366';
      };

      const onMouseMove = (e) => {
        const dx = (e.clientX - startX) / currentZoom;
        const newW = Math.max(30, startW + dx);

        const table = cell.closest('table');

        if (isDerived && table) {
          const cellIndex = cell.cellIndex;

          table.querySelectorAll('tr').forEach(tr => {
            const targetCell = tr.children[cellIndex];
            if (!targetCell) return;
            targetCell.style.width = `${newW}px`;
            targetCell.style.maxWidth = `${newW}px`;
            targetCell.style.minWidth = '30px';
          });
        } else {
          cell.style.width = `${newW}px`;
          cell.style.maxWidth = `${newW}px`;
          cell.style.minWidth = '30px';
          syncSecondaryTableWidthsFromMain();
        }
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        resizer.style.borderRight = '';
        document.body.style.userSelect = '';
        document.body.style.cursor = '';

        if (!isDerived) {
          syncSecondaryTableWidthsFromMain();
          captureAndSaveColumnWidths();
        } else {
          if (areTablesWidthLinked) {
            syncSecondaryTableWidthsFromMain({ linkColumns: true });
          } else {
            captureAndSaveDerivedColumnWidths();
          }
        }
        isUserDragging = false;
        flushPendingAfterInteraction();
      };

      resizer.addEventListener('mousedown', onMouseDown);
    }

    function setupRowResizer(cell, resizer) {
      let startY = 0, startH = 0;
      const row = cell.parentElement;
      let isDerived = false;

      const onMouseDown = (e) => {
        e.stopPropagation();
        isUserDragging = true;
        startY = e.clientY;
        startH = row.getBoundingClientRect().height / currentZoom;

        const table = cell.closest('table');
        isDerived = !!(table && table.classList.contains('derivedTable'));

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'row-resize';
        resizer.style.borderBottom = '2px solid #169366';
      };

      const onMouseMove = (e) => {
        const dy = (e.clientY - startY) / currentZoom;
        const newH = Math.max(20, startH + dy);
        row.style.height = `${newH}px`;
        Array.from(row.children).forEach(child => child.style.height = `${newH}px`);
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        resizer.style.borderBottom = '';
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        if (isDerived) {
          captureAndSaveDerivedRowHeights();
        } else {
          captureAndSaveRowHeights();
        }
        isUserDragging = false;
        flushPendingAfterInteraction();
      };

      resizer.addEventListener('mousedown', onMouseDown);
    }
  </script>
