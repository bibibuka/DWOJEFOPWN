<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Grist Ultimate Pivot</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.css">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; padding: 0; background-color: white;
    }

    /* --- ТУЛБАР --- */
    #toolbar {
      padding: 8px 12px; background: #f7f7f7; border-bottom: 1px solid #e0e0e0;
      display: flex; justify-content: space-between; align-items: center;
      height: 48px; box-sizing: border-box;
      position: sticky; top: 0; z-index: 1000;
    }
    .toolbar-group { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555; }
    input[type=range] { width: 90px; cursor: pointer; }

    .global-drag {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 10px; height: 26px;
      background: #fff; border: 1px solid #ccc; border-radius: 4px;
      user-select: none; font-size: 12px; font-weight: 600; color: #333;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: background 0.1s;
    }
    #drag-all-cols { cursor: ew-resize; }
    #drag-all-rows { cursor: ns-resize; }
    .global-drag:hover { background: #f0f0f0; }
    .global-drag:active { background: #e0f0ea; border-color: #169366; }

    button#toggle-mode {
      background-color: #169366; color: white; border: none; padding: 6px 15px;
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    button#toggle-mode:hover { background-color: #127a55; }

    /* --- КОНТЕЙНЕР --- */
    #output {
      padding: 20px;
      overflow: auto;
      height: calc(100vh - 48px);
      width: 100vw;
      box-sizing: border-box;
    }

    /* --- ТАБЛИЦА --- */
    .pvtTable {
      font-size: 13px;
      border-collapse: collapse;
      border: 1px solid #ddd;
      font-family: inherit;
      table-layout: fixed;
      width: max-content;
      min-width: auto;
      transform-origin: top left;
    }

    .pvtTable th, .pvtTable td {
      border: 1px solid #ccc;
      padding: 5px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      position: relative;
      box-sizing: border-box;
      height: 30px;
      min-width: 30px;
      max-width: none;
    }

    .pvtTable th { background-color: #f2f2f2; font-weight: 600; }

    /* --- ИНДИВИДУАЛЬНЫЕ РЕСАЙЗЕРЫ --- */
    .resizer-col {
      position: absolute; top: 0; right: 0; width: 6px; cursor: col-resize;
      z-index: 20; user-select: none; height: 100%;
    }
    .resizer-col:hover { border-right: 2px solid #169366; }

    .resizer-row {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; cursor: row-resize;
      z-index: 20; user-select: none;
    }
    .resizer-row:hover { border-bottom: 2px solid #169366; }

    /* --- CLEAN MODE --- */
    .clean-mode .pvtAxisContainer, .clean-mode .pvtRenderer,
    .clean-mode .pvtAggregator, .clean-mode .pvtAttrDropdown,
    .clean-mode .pvtTriangle, .clean-mode .ui-icon,
    .clean-mode .pvtTopLeft,
    .clean-mode thead tr:first-child > th.pvtAxisContainer,
    .clean-mode thead tr:first-child > th.pvtTopLeft {
      display: none !important;
    }
    .clean-mode table.pvtUi { display: block; padding: 0; margin: 0; }
    .clean-mode td.pvtRendererArea { padding: 0 !important; border: none !important; }
    .clean-mode .pvtTable th { cursor: default; background-image: none !important; }

    /* FIX: горизонтальный список полей */
    #output .pvtHorizList li { display: inline-block !important; float: none !important; }
    #output .pvtAxisContainer ul.pvtAttrList { padding-left: 0 !important; margin: 0 !important; }

    /* --- ВТОРАЯ KPI-ТАБЛИЦА --- */
    #secondary-table-wrap {
      margin-top: 24px;
      width: max-content;
    }

    .derivedTable {
      border-collapse: collapse;
      width: max-content;
      min-width: auto;
    }

    .derivedTable th.metric-label {
      background: #93a7c7;
      color: #fff;
      font-weight: 700;
      text-align: left;
    }

    .derivedTable td.metric-val {
      text-align: center;
      font-weight: 700;
    }

    .derivedTable td.metric-na {
      background: #f3f3f3 !important;
      color: #999 !important;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.ru.min.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>

<body>
  <div id="toolbar">
    <div class="toolbar-group" id="zoom-controls">
      <span>🔍</span>
      <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.1" value="1">
      <span id="zoom-val" style="width: 40px;">100%</span>
    </div>

    <div class="toolbar-group">
      <span style="color:#888;">Растянуть всё:</span>
      <div class="global-drag" id="drag-all-cols" title="Зажмите и тяните вправо/влево">↔ Столбцы</div>
      <div class="global-drag" id="drag-all-rows" title="Зажмите и тяните вниз/вверх">↕ Строки</div>
    </div>

    <button id="toggle-mode" onclick="toggleMode()">Настройки</button>
  </div>

  <div id="output">Загрузка...</div>

  <script>
    // -----------------------------
    // СОСТОЯНИЕ
    // -----------------------------
    let rawRecords = [];
    let mappedRecords = [];
    let columnLabels = {};
    let currentTableId = null;

    let isViewOnly = false;
    let currentZoom = 1;

    let renderInProgress = false;
    let renderPending = false;

    let reloadInFlight = false;
    let lastDataStamp = 0;

    let currentPivotConfig = {
      rows: [],
      cols: [],
      vals: [],
      inclusions: {},
      exclusions: {},
      rendererName: "Таблица",
      aggregatorName: "Количество"
    };

    grist.ready({ requiredAccess: 'full' });

    // -----------------------------
    // КОНСТАНТЫ ДЛЯ KPI / COUNTA
    // -----------------------------
    const STATUS_FIELD_ALIASES = [
      'СТАТУС ВОРОНКИ',
      'СТАТУС',
      'ЭТАП ВОРОНКИ'
    ];

    const COUNTA_FIELD_ALIASES = [
      'ФИО',
      'FIO',
      'ФИО КАНДИДАТА',
      'КАНДИДАТ',
      'СОТРУДНИК'
    ];

    const STATUS_ALIASES = {
      authorized:       ['АВТОРИЗОВАЛСЯ'],
      firstShift:       ['ВЫШЕЛ НА СМЕНУ'],
      lmkUploaded:      ['ЗАГРУЗИЛ ЛМК'],
      passportUploaded: ['ЗАГРУЗИЛ ПАСПОРТ'],
      registeredInPark: ['ЗАРЕГИСТРИРОВАЛИ В ПАРКЕ'],
      lmkExpiring:      ['ЛМК ЗАКАНЧИВАЕТСЯ'],
      lmkExpired:       ['ЛМК ЗАКОНЧИЛАСЬ', 'ЛМК ЗАКОНЧИЛСЯ'],
      shiftAssigned:    ['НАЗНАЧЕНА СМЕНА']
    };

    const STATUS_ALIAS_SETS = Object.fromEntries(
      Object.entries(STATUS_ALIASES).map(([k, arr]) => [k, new Set(arr.map(normalizeLabel))])
    );

    // -----------------------------
    // HELPERS
    // -----------------------------
    async function getTableIdSafe() {
      try { return await grist.getTable().getTableId(); }
      catch (e) { console.warn("Не удалось получить tableId", e); return null; }
    }

    async function getConfigKeyForCurrentTable() {
      const tableId = await getTableIdSafe();
      return tableId ? `pivotConfig:${tableId}` : `pivotConfig`;
    }

    function sanitizeConfig(savedConfig, fields) {
      const cleanArr = (a) => (Array.isArray(a) ? a.filter(x => fields.includes(x)) : []);
      return {
        ...savedConfig,
        rows: cleanArr(savedConfig.rows),
        cols: cleanArr(savedConfig.cols),
        vals: cleanArr(savedConfig.vals)
      };
    }

    function mapRecordsWithLabels(records) {
      return (records || []).map(rec => {
        const cleanRow = {};
        Object.keys(rec).forEach(key => {
          if (key === 'id' || key === 'manualSort') return;
          const label = columnLabels[key] || key;
          cleanRow[label] = rec[key];
        });
        return cleanRow;
      });
    }

    async function loadColumnLabelsForCurrentTable() {
      columnLabels = {};
      try {
        const tableId = await getTableIdSafe();
        if (!tableId) return;

        const tables = await grist.docApi.fetchTable('_grist_Tables');
        const nT = (tables.tableId || []).length;

        let tableRef = null;
        for (let i = 0; i < nT; i++) {
          if (tables.tableId[i] === tableId) {
            tableRef = tables.id[i];
            break;
          }
        }
        if (!tableRef) return;

        const cols = await grist.docApi.fetchTable('_grist_Tables_column');
        const nC = (cols.colId || []).length;

        for (let i = 0; i < nC; i++) {
          if (cols.parentId?.[i] !== tableRef) continue;
          const colId = cols.colId[i];
          const label = cols.label?.[i] || colId;
          if (colId) columnLabels[colId] = label;
        }
      } catch (e) {
        console.warn("Не удалось загрузить labels (будут colId)", e);
      }
    }

    async function ensureTableContextUpToDate() {
      const tableId = await getTableIdSafe();
      if (!tableId) return;

      if (currentTableId !== tableId) {
        currentTableId = tableId;
        await loadColumnLabelsForCurrentTable();
      }
    }

    function scheduleRender() {
      if (renderInProgress) {
        renderPending = true;
        return;
      }
      renderPivot();
    }

    function normalizeLabel(v) {
      return String(v ?? '')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase()
        .replace(/Ё/g, 'Е');
    }

    function safeDiv(a, b) {
      return (b === 0 || b == null || !Number.isFinite(b)) ? null : a / b;
    }

    function formatPercentRU(value, digits = 2) {
      if (value == null || !Number.isFinite(value)) return '—';
      return (value * 100).toFixed(digits).replace('.', ',') + '%';
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      return {
        r: parseInt(clean.substring(0, 2), 16),
        g: parseInt(clean.substring(2, 4), 16),
        b: parseInt(clean.substring(4, 6), 16)
      };
    }

    function mixColors(c1, c2, t) {
      const a = hexToRgb(c1);
      const b = hexToRgb(c2);
      const lerp = (x, y) => Math.round(x + (y - x) * t);
      return `rgb(${lerp(a.r, b.r)}, ${lerp(a.g, b.g)}, ${lerp(a.b, b.b)})`;
    }

    function getTextColorForBg(color) {
      const m = color.match(/\d+/g);
      if (!m) return '#222';
      const [r, g, b] = m.map(Number);
      const yiq = (r * 299 + g * 587 + b * 114) / 1000;
      return yiq >= 145 ? '#222' : '#fff';
    }

    function getHeatColor(value, min, max) {
      if (value == null || !Number.isFinite(value)) return '#f3f3f3';
      if (!Number.isFinite(min) || !Number.isFinite(max) || min === max) {
        return 'rgb(210, 230, 190)';
      }

      const low  = '#e57373';
      const mid  = '#f6d365';
      const high = '#6aa84f';

      const midpoint = (min + max) / 2;

      if (value <= midpoint) {
        const denom = (midpoint - min) || 1;
        const t = Math.max(0, Math.min(1, (value - min) / denom));
        return mixColors(low, mid, t);
      } else {
        const denom = (max - midpoint) || 1;
        const t = Math.max(0, Math.min(1, (value - midpoint) / denom));
        return mixColors(mid, high, t);
      }
    }

    function findFieldByAliases(fields, aliases) {
      const lookup = new Map(fields.map(f => [normalizeLabel(f), f]));
      for (const alias of aliases) {
        const found = lookup.get(normalizeLabel(alias));
        if (found) return found;
      }
      return null;
    }

    function normalizeComparableValue(v) {
      if (v === null || v === undefined) return 'null';
      if (typeof v === 'number' || typeof v === 'boolean') return String(v);
      if (v instanceof Date) return String(v.getTime());
      if (typeof v === 'object') {
        try { return JSON.stringify(v); } catch (e) { return String(v); }
      }
      return String(v);
    }

    function collectionToComparableSet(coll) {
      const out = new Set();
      if (!coll) return out;

      if (Array.isArray(coll)) {
        coll.forEach(v => out.add(normalizeComparableValue(v)));
        return out;
      }

      if (typeof coll === 'object') {
        Object.keys(coll).forEach(k => out.add(normalizeComparableValue(k)));
        return out;
      }

      out.add(normalizeComparableValue(coll));
      return out;
    }

    function recordMatchesPivotFilters(record, config) {
      const inclusions = config?.inclusions || {};
      const exclusions = config?.exclusions || {};

      for (const [field, allowed] of Object.entries(inclusions)) {
        const allowedSet = collectionToComparableSet(allowed);
        if (!allowedSet.size) continue;

        const recVal = normalizeComparableValue(record[field]);
        if (!allowedSet.has(recVal)) return false;
      }

      for (const [field, blocked] of Object.entries(exclusions)) {
        const blockedSet = collectionToComparableSet(blocked);
        if (!blockedSet.size) continue;

        const recVal = normalizeComparableValue(record[field]);
        if (blockedSet.has(recVal)) return false;
      }

      return true;
    }

    function naturalCompare(a, b) {
      const nat = $.pivotUtilities?.naturalSort;
      if (typeof nat === 'function') return nat(a, b);

      return String(a ?? '').localeCompare(String(b ?? ''), 'ru', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function sortKeyArrays(keys) {
      return [...keys].sort((ka, kb) => {
        const len = Math.max(ka.length, kb.length);
        for (let i = 0; i < len; i++) {
          const cmp = naturalCompare(ka[i], kb[i]);
          if (cmp !== 0) return cmp;
        }
        return 0;
      });
    }

    function isCountaValue(v) {
      if (v === null || v === undefined) return false;
      if (typeof v === 'string') return v.trim() !== '';
      return true;
    }

    function makeCountaAggregatorForField(fieldName, formatter) {
      return function() {
        return function(data, rowKey, colKey) {
          let count = 0;
          return {
            push(record) {
              if (isCountaValue(record[fieldName])) count++;
            },
            value() {
              return count;
            },
            format: formatter || (x => String(x)),
            numInputs: 0
          };
        };
      };
    }

    function createCounterBucket() {
      return {
        total: 0,
        authorized: 0,
        firstShift: 0,
        lmkUploaded: 0,
        passportUploaded: 0,
        registeredInPark: 0,
        lmkExpiring: 0,
        lmkExpired: 0,
        shiftAssigned: 0
      };
    }

    function incrementBucket(bucket, normalizedStatus) {
      bucket.total += 1;

      if (STATUS_ALIAS_SETS.authorized.has(normalizedStatus))       bucket.authorized += 1;
      if (STATUS_ALIAS_SETS.firstShift.has(normalizedStatus))       bucket.firstShift += 1;
      if (STATUS_ALIAS_SETS.lmkUploaded.has(normalizedStatus))      bucket.lmkUploaded += 1;
      if (STATUS_ALIAS_SETS.passportUploaded.has(normalizedStatus)) bucket.passportUploaded += 1;
      if (STATUS_ALIAS_SETS.registeredInPark.has(normalizedStatus)) bucket.registeredInPark += 1;
      if (STATUS_ALIAS_SETS.lmkExpiring.has(normalizedStatus))      bucket.lmkExpiring += 1;
      if (STATUS_ALIAS_SETS.lmkExpired.has(normalizedStatus))       bucket.lmkExpired += 1;
      if (STATUS_ALIAS_SETS.shiftAssigned.has(normalizedStatus))    bucket.shiftAssigned += 1;
    }

    function buildDerivedMetricsFromRecords(records, config) {
      if (!records || !records.length) return null;

      const fields = Object.keys(records[0] || {});
      const statusField = findFieldByAliases(fields, STATUS_FIELD_ALIASES);
      if (!statusField) return null;

      const countaField = findFieldByAliases(fields, COUNTA_FIELD_ALIASES);

      const colFields = Array.isArray(config?.cols)
        ? config.cols.filter(f => fields.includes(f))
        : [];

      const filteredRecords = records.filter(rec => recordMatchesPivotFilters(rec, config));

      const grandBucket = createCounterBucket();
      const byColKey = new Map();

      const getKeyArr = (rec) => colFields.map(f => rec[f] ?? null);
      const keyToString = (arr) => JSON.stringify(arr);

      const ensureBucket = (keyArr) => {
        const key = keyToString(keyArr);
        if (!byColKey.has(key)) byColKey.set(key, createCounterBucket());
        return byColKey.get(key);
      };

      for (const rec of filteredRecords) {
        if (countaField && !isCountaValue(rec[countaField])) continue;

        const normalizedStatus = normalizeLabel(rec[statusField]);

        incrementBucket(grandBucket, normalizedStatus);

        if (colFields.length > 0) {
          const keyArr = getKeyArr(rec);
          incrementBucket(ensureBucket(keyArr), normalizedStatus);
        }
      }

      let orderedBuckets = [];

      if (colFields.length > 0) {
        const orderedKeys = sortKeyArrays(
          Array.from(byColKey.keys()).map(k => JSON.parse(k))
        );
        orderedBuckets = orderedKeys.map(keyArr => byColKey.get(keyToString(keyArr)) || createCounterBucket());
        orderedBuckets.push(grandBucket);
      } else {
        orderedBuckets = [grandBucket];
      }

      const metrics = [
        {
          label: '% всех кто зашел',
          digits: 1,
          values: orderedBuckets.map(b => safeDiv(b.total - b.registeredInPark, b.total))
        },
        {
          label: '% загрузил паспорт',
          digits: 2,
          values: orderedBuckets.map(b => safeDiv(b.passportUploaded, b.total - b.registeredInPark))
        },
        {
          label: '% загрузил ЛМК',
          digits: 2,
          values: orderedBuckets.map(b =>
            safeDiv(
              b.firstShift + b.lmkUploaded + b.lmkExpiring + b.lmkExpired + b.shiftAssigned,
              b.total - b.registeredInPark
            )
          )
        },
        {
          label: '% готовых к работе',
          digits: 2,
          values: orderedBuckets.map(b =>
            safeDiv(
              b.total - b.authorized - b.registeredInPark,
              b.total
            )
          )
        },
        {
          label: '% первая смена',
          digits: 2,
          values: orderedBuckets.map(b => safeDiv(b.firstShift, b.total))
        }
      ];

      return {
        metrics,
        colCount: orderedBuckets.length
      };
    }

    function getMainTableLayoutHints(expectedCols) {
      let labelWidth = 260;
      let dataWidths = Array(expectedCols).fill(80);

      const rendererArea = document.querySelector('#output .pvtRendererArea');
      if (!rendererArea) return { labelWidth, dataWidths };

      const mainTable = rendererArea.querySelector('.pvtTable:not(.derivedTable)');
      if (!mainTable) return { labelWidth, dataWidths };

      const bodyRows = Array.from(mainTable.querySelectorAll('tbody tr'));
      if (!bodyRows.length) return { labelWidth, dataWidths };

      for (const tr of bodyRows) {
        const labelCell = [...tr.querySelectorAll('th')].reverse().find(th => normalizeLabel(th.textContent));
        if (labelCell) {
          labelWidth = Math.max(labelWidth, labelCell.getBoundingClientRect().width / currentZoom);
        }
      }

      let refTds = [];
      const totalRow = bodyRows.find(tr =>
        tr.querySelector('th.pvtTotalLabel') ||
        [...tr.querySelectorAll('th')].some(th => normalizeLabel(th.textContent) === 'ИТОГО')
      );

      if (totalRow) {
        refTds = Array.from(totalRow.querySelectorAll('td'));
      }

      if (!refTds.length) {
        const firstDataRow = bodyRows.find(tr => tr.querySelectorAll('td').length > 0);
        if (firstDataRow) {
          refTds = Array.from(firstDataRow.querySelectorAll('td'));
        }
      }

      if (refTds.length) {
        dataWidths = refTds.map(td => td.getBoundingClientRect().width / currentZoom);
      }

      if (dataWidths.length < expectedCols) {
        while (dataWidths.length < expectedCols) {
          dataWidths.push(dataWidths[dataWidths.length - 1] || 80);
        }
      } else if (dataWidths.length > expectedCols) {
        dataWidths = dataWidths.slice(0, expectedCols);
      }

      return { labelWidth, dataWidths };
    }

    function syncSecondaryTableWidthsFromMain() {
      const wrap = document.getElementById('secondary-table-wrap');
      if (!wrap) return;

      const derivedTable = wrap.querySelector('.derivedTable');
      if (!derivedTable) return;

      const firstRow = derivedTable.querySelector('tr');
      if (!firstRow) return;

      const expectedCols = firstRow.querySelectorAll('td.metric-val').length;
      const { labelWidth, dataWidths } = getMainTableLayoutHints(expectedCols);

      derivedTable.querySelectorAll('tr').forEach(tr => {
        const th = tr.querySelector('th.metric-label');
        if (th) {
          th.style.width = `${labelWidth}px`;
          th.style.minWidth = `${labelWidth}px`;
          th.style.maxWidth = `${labelWidth}px`;
        }

        tr.querySelectorAll('td.metric-val').forEach((td, idx) => {
          const w = dataWidths[idx] || 80;
          td.style.width = `${w}px`;
          td.style.minWidth = `${w}px`;
          td.style.maxWidth = `${w}px`;
        });
      });
    }

    function renderSecondFormulaTable() {
      const rendererArea = document.querySelector('#output .pvtRendererArea');
      if (!rendererArea) return;

      const old = document.getElementById('secondary-table-wrap');
      if (old) old.remove();

      const result = buildDerivedMetricsFromRecords(mappedRecords, currentPivotConfig);
      if (!result) return;

      const { metrics, colCount } = result;
      const { labelWidth, dataWidths } = getMainTableLayoutHints(colCount);

      const wrap = document.createElement('div');
      wrap.id = 'secondary-table-wrap';

      const table = document.createElement('table');
      table.className = 'pvtTable derivedTable';

      const tbody = document.createElement('tbody');

      metrics.forEach(metric => {
        const tr = document.createElement('tr');

        const validVals = metric.values.filter(v => v != null && Number.isFinite(v));
        const min = validVals.length ? Math.min(...validVals) : 0;
        const max = validVals.length ? Math.max(...validVals) : 1;

        const th = document.createElement('th');
        th.className = 'metric-label pvtRowLabel';
        th.textContent = metric.label;
        th.style.width = `${labelWidth}px`;
        th.style.minWidth = `${labelWidth}px`;
        th.style.maxWidth = `${labelWidth}px`;
        tr.appendChild(th);

        metric.values.forEach((val, idx) => {
          const td = document.createElement('td');
          td.className = 'metric-val';
          td.textContent = formatPercentRU(val, metric.digits);

          const w = dataWidths[idx] || 80;
          td.style.width = `${w}px`;
          td.style.minWidth = `${w}px`;
          td.style.maxWidth = `${w}px`;

          if (val == null || !Number.isFinite(val)) {
            td.classList.add('metric-na');
          } else {
            const bg = getHeatColor(val, min, max);
            td.style.backgroundColor = bg;
            td.style.color = getTextColorForBg(bg);
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      wrap.appendChild(table);
      rendererArea.appendChild(wrap);
    }

    function postRenderEnhance() {
      initIndividualResizing();
      renderSecondFormulaTable();
      syncSecondaryTableWidthsFromMain();
      initIndividualResizing();
      applyZoom();
    }

    // -----------------------------
    // FORCE RELOAD
    // -----------------------------
    async function forceReloadFromGrist(reason = "") {
      if (reloadInFlight) return;
      reloadInFlight = true;
      try {
        const rows = await grist.fetchSelectedTable({ format: "rows", includeColumns: "normal" });
        rawRecords = rows || [];
        lastDataStamp = Date.now();
        scheduleRender();
      } catch (e) {
        console.warn("forceReloadFromGrist failed", reason, e);
      } finally {
        reloadInFlight = false;
      }
    }

    setTimeout(() => forceReloadFromGrist("startup"), 0);

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) setTimeout(() => forceReloadFromGrist("visibilitychange"), 50);
    });
    window.addEventListener("focus", () => setTimeout(() => forceReloadFromGrist("focus"), 50));

    setInterval(() => {
      if (document.hidden) return;
      const pivotExists = !!document.querySelector('#output .pvtTable');
      if (!pivotExists) forceReloadFromGrist("watchdog_missing_pivot");
    }, 5000);

    // -----------------------------
    // ЗУМ
    // -----------------------------
    $('#zoom-slider').on('input', async function () {
      currentZoom = parseFloat($(this).val());
      applyZoom();

      const key = await getConfigKeyForCurrentTable();
      const config = (await grist.getOption(key)) || {};
      config.zoomLevel = currentZoom;
      await grist.setOption(key, config);
    });

    function applyZoom() {
      $('#zoom-val').text(Math.round(currentZoom * 100) + '%');
      $('.pvtTable').css('zoom', currentZoom);
    }

    // -----------------------------
    // РЕЖИМ "НАСТРОЙКИ/ЧИСТО"
    // -----------------------------
    async function toggleMode() {
      isViewOnly = !isViewOnly;
      updateViewMode();

      const key = await getConfigKeyForCurrentTable();
      const config = (await grist.getOption(key)) || {};
      config.isViewOnly = isViewOnly;
      await grist.setOption(key, config);
    }

    function updateViewMode() {
      const btn = document.getElementById('toggle-mode');
      const container = document.getElementById('output');

      if (isViewOnly) {
        container.classList.add('clean-mode');
        btn.innerText = "Настройки";
        btn.style.backgroundColor = "#888";
      } else {
        container.classList.remove('clean-mode');
        btn.innerText = "Готово (Скрыть)";
        btn.style.backgroundColor = "#169366";
      }
    }

    // -----------------------------
    // RENDER PIVOT
    // -----------------------------
    async function renderPivot() {
      renderInProgress = true;
      try {
        await ensureTableContextUpToDate();

        if (!rawRecords || rawRecords.length === 0) {
          $('#output').text("Нет данных.");
          return;
        }

        const currentRecords = mapRecordsWithLabels(rawRecords);
        mappedRecords = currentRecords;

        const fields = currentRecords.length ? Object.keys(currentRecords[0]) : [];

        const key = await getConfigKeyForCurrentTable();
        const savedConfig = (await grist.getOption(key)) || {};

        if (savedConfig.isViewOnly !== undefined) isViewOnly = savedConfig.isViewOnly;
        if (savedConfig.zoomLevel !== undefined) {
          currentZoom = savedConfig.zoomLevel;
          $('#zoom-slider').val(currentZoom);
        }
        updateViewMode();

        const ruLocales = $.pivotUtilities.locales.ru;
        const tpl = $.pivotUtilities.aggregators;
        const intFormatter = $.pivotUtilities.numberFormat({ digitsAfterDecimal: 0 });

        const countaField = findFieldByAliases(fields, COUNTA_FIELD_ALIASES);

        const myAggregators = {
          "Количество":            tpl["Count"],
          "Количество уникальных": tpl["Count Unique Values"],
          "Кол-во по всему":       tpl["Count as Fraction of Total"],
          "Кол-во по строке":      tpl["Count as Fraction of Rows"],
          "Кол-во по столбцу":     tpl["Count as Fraction of Columns"]
        };

        if (countaField) {
          myAggregators[`COUNTA по ${countaField}`] = makeCountaAggregatorForField(countaField, intFormatter);
        }

        const safeConfig = sanitizeConfig(savedConfig, fields);

        let resolvedAggregatorName = safeConfig.aggregatorName || "Количество";
        if (!myAggregators[resolvedAggregatorName]) {
          resolvedAggregatorName = "Количество";
        }

        currentPivotConfig = {
          rows: safeConfig.rows || [],
          cols: safeConfig.cols || [],
          vals: safeConfig.vals || [],
          inclusions: safeConfig.inclusions || {},
          exclusions: safeConfig.exclusions || {},
          rendererName: safeConfig.rendererName || "Таблица",
          aggregatorName: resolvedAggregatorName
        };

        const options = {
          renderers: ruLocales.renderers,
          aggregators: myAggregators,

          rendererName: currentPivotConfig.rendererName,
          aggregatorName: currentPivotConfig.aggregatorName,

          rows: currentPivotConfig.rows,
          cols: currentPivotConfig.cols,
          vals: currentPivotConfig.vals,

          inclusions: currentPivotConfig.inclusions,
          exclusions: currentPivotConfig.exclusions,

          unusedAttrsVertical: false,

          onRefresh: function (cfg) {
            let refreshedAggregatorName = cfg.aggregatorName || "Количество";
            if (!myAggregators[refreshedAggregatorName]) {
              refreshedAggregatorName = "Количество";
            }

            currentPivotConfig = {
              rows: cfg.rows || [],
              cols: cfg.cols || [],
              vals: cfg.vals || [],
              inclusions: cfg.inclusions || {},
              exclusions: cfg.exclusions || {},
              rendererName: cfg.rendererName || "Таблица",
              aggregatorName: refreshedAggregatorName
            };

            const configToSave = {
              rows: currentPivotConfig.rows,
              cols: currentPivotConfig.cols,
              vals: currentPivotConfig.vals,
              rendererName: currentPivotConfig.rendererName,
              aggregatorName: currentPivotConfig.aggregatorName,
              inclusions: currentPivotConfig.inclusions,
              exclusions: currentPivotConfig.exclusions,
              isViewOnly: isViewOnly,
              zoomLevel: currentZoom
            };

            grist.setOption(key, configToSave);

            setTimeout(() => {
              postRenderEnhance();
            }, 200);
          }
        };

        $("#output").empty().pivotUI(currentRecords, options, true);

        setTimeout(() => {
          postRenderEnhance();
        }, 200);

      } catch (e) {
        console.error(e);
        $('#output').text("Ошибка рендера: " + (e?.message || e));
      } finally {
        renderInProgress = false;
        if (renderPending) {
          renderPending = false;
          scheduleRender();
        }
      }
    }

    // -----------------------------
    // GRIST: подписка на записи
    // -----------------------------
    grist.onRecords(function (records) {
      rawRecords = records || [];
      lastDataStamp = Date.now();
      scheduleRender();
    }, { format: "rows", includeColumns: "normal" });

    // -----------------------------
    // 1) ГЛОБАЛЬНОЕ РАСТЯГИВАНИЕ
    // -----------------------------
    function setupGlobalResizers() {
      const dragCols = document.getElementById('drag-all-cols');
      const dragRows = document.getElementById('drag-all-rows');

      dragCols.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const startX = e.clientX;

        const mainTable = document.querySelector('#output .pvtRendererArea .pvtTable:not(.derivedTable)');
        const headers = mainTable
          ? mainTable.querySelectorAll('th')
          : document.querySelectorAll('.pvtTable:not(.derivedTable) th');

        const initialWidths = Array.from(headers).map(th => th.getBoundingClientRect().width / currentZoom);

        const onMouseMove = (ev) => {
          const dx = (ev.clientX - startX) / currentZoom;

          headers.forEach((th, idx) => {
            const newW = Math.max(30, initialWidths[idx] + dx);
            th.style.width = `${newW}px`;
            th.style.maxWidth = `${newW}px`;
            th.style.minWidth = '30px';
          });

          syncSecondaryTableWidthsFromMain();
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
          syncSecondaryTableWidthsFromMain();
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.cursor = 'ew-resize';
      });

      dragRows.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const startY = e.clientY;
        const rows = document.querySelectorAll('.pvtTable tr');
        const initialHeights = Array.from(rows).map(tr => tr.getBoundingClientRect().height / currentZoom);

        const onMouseMove = (ev) => {
          const dy = (ev.clientY - startY) / currentZoom;
          rows.forEach((tr, idx) => {
            const newH = Math.max(20, initialHeights[idx] + dy);
            tr.style.height = `${newH}px`;
            Array.from(tr.children).forEach(child => child.style.height = `${newH}px`);
          });
        };

        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          document.body.style.cursor = '';
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.cursor = 'ns-resize';
      });
    }
    setupGlobalResizers();

    // -----------------------------
    // 2) ИНДИВИДУАЛЬНЫЕ РЕСАЙЗЕРЫ
    // -----------------------------
    function initIndividualResizing() {
      const headers = document.querySelectorAll('.pvtTable th');
      headers.forEach(th => {
        th.style.maxWidth = 'none';
        const realWidth = th.getBoundingClientRect().width;
        const cssWidth = realWidth / currentZoom;

        th.style.width = `${cssWidth}px`;
        th.style.minWidth = '30px';
        th.style.maxWidth = `${cssWidth}px`;
      });

      const allCells = document.querySelectorAll(
        '.pvtTable th, .pvtTable .pvtRowLabel, .pvtTable .pvtColLabel, .derivedTable td.metric-val'
      );

      allCells.forEach(cell => {
        if (cell.querySelector('.resizer-col')) return;

        const colResizer = document.createElement('div');
        colResizer.classList.add('resizer-col');
        cell.appendChild(colResizer);
        setupColResizer(cell, colResizer);

        const rowResizer = document.createElement('div');
        rowResizer.classList.add('resizer-row');
        cell.appendChild(rowResizer);
        setupRowResizer(cell, rowResizer);
      });
    }

    function setupColResizer(cell, resizer) {
      let startX = 0, startW = 0;

      const onMouseDown = (e) => {
        e.stopPropagation();
        startX = e.clientX;
        startW = cell.getBoundingClientRect().width / currentZoom;

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        resizer.style.borderRight = '2px solid #169366';
      };

      const onMouseMove = (e) => {
        const dx = (e.clientX - startX) / currentZoom;
        const newW = Math.max(30, startW + dx);

        const table = cell.closest('table');
        const isDerived = table && table.classList.contains('derivedTable');

        if (isDerived) {
          const cellIndex = cell.cellIndex;

          table.querySelectorAll('tr').forEach(tr => {
            const targetCell = tr.children[cellIndex];
            if (!targetCell) return;
            targetCell.style.width = `${newW}px`;
            targetCell.style.maxWidth = `${newW}px`;
            targetCell.style.minWidth = '30px';
          });
        } else {
          cell.style.width = `${newW}px`;
          cell.style.maxWidth = `${newW}px`;
          cell.style.minWidth = '30px';

          syncSecondaryTableWidthsFromMain();
        }
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        resizer.style.borderRight = '';
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        syncSecondaryTableWidthsFromMain();
      };

      resizer.addEventListener('mousedown', onMouseDown);
    }

    function setupRowResizer(cell, resizer) {
      let startY = 0, startH = 0;
      const row = cell.parentElement;

      const onMouseDown = (e) => {
        e.stopPropagation();
        startY = e.clientY;
        startH = row.getBoundingClientRect().height / currentZoom;

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'row-resize';
        resizer.style.borderBottom = '2px solid #169366';
      };

      const onMouseMove = (e) => {
        const dy = (e.clientY - startY) / currentZoom;
        const newH = Math.max(20, startH + dy);
        row.style.height = `${newH}px`;
        Array.from(row.children).forEach(child => child.style.height = `${newH}px`);
      };

      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        resizer.style.borderBottom = '';
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
      };

      resizer.addEventListener('mousedown', onMouseDown);
    }
  </script>
</body>
