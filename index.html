<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Grist Ultimate Pivot</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.css">

  <style>
    :root {
      --excel-green: #217346;
      --excel-green-dark: #185c37;
      --excel-blue: #5b9bd5;
      --excel-blue-dark: #2f5597;
      --excel-blue-light: #d9e2f3;
      --excel-border: #b7c9e2;
      --excel-surface: #f7fbff;
      --excel-surface-alt: #eef4fb;
      --excel-text: #1f1f1f;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: white;
      color: var(--excel-text);
    }

    /* --- ТУЛБАР --- */
    #toolbar {
      padding: 8px 12px;
      background: var(--excel-surface);
      border-bottom: 1px solid var(--excel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 48px;
      box-sizing: border-box;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
    }

    input[type=range] {
      width: 90px;
      cursor: pointer;
    }

    .global-drag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      height: 26px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      user-select: none;
      font-size: 12px;
      font-weight: 600;
      color: #333;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: background 0.1s;
    }

    #drag-all-cols { cursor: ew-resize; }
    #drag-all-rows { cursor: ns-resize; }

    .global-drag:hover { background: #f0f0f0; }
    .global-drag:active {
      background: #e0f0ea;
      border-color: var(--excel-green);
    }

    button#toggle-mode {
      background-color: var(--excel-green);
      color: white;
      border: none;
      padding: 6px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    button#toggle-mode:hover { background-color: var(--excel-green-dark); }

    button#toggle-link-widths {
      background-color: var(--excel-blue);
      color: white;
      border: none;
      padding: 6px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    button#toggle-link-widths:hover { background-color: var(--excel-blue-dark); }

    /* --- КОНТЕЙНЕР --- */
    #output {
      padding: 20px;
      overflow: auto;
      height: calc(100vh - 48px);
      width: 100vw;
      box-sizing: border-box;
    }

    /* --- ТАБЛИЦЫ --- */
    .pvtTable {
      font-size: 13px;
      border-collapse: collapse;
      border: 1px solid var(--excel-border);
      font-family: inherit;
      table-layout: fixed;
      width: max-content;
      min-width: auto;
      transform-origin: top left;
    }

    .pvtTable th, .pvtTable td {
      border: 1px solid var(--excel-border);
      padding: 5px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      position: relative;
      box-sizing: border-box;
      height: 30px;
      min-width: 30px;
      max-width: none;
    }

    .pvtTable th {
      background-color: var(--excel-blue-light);
      color: var(--excel-text);
      font-weight: 600;
    }

    /* --- ИНДИВИДУАЛЬНЫЕ РЕСАЙЗЕРЫ --- */
    .resizer-col {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      cursor: col-resize;
      z-index: 20;
      user-select: none;
      height: 100%;
    }

    .resizer-col:hover { border-right: 2px solid var(--excel-green); }

    .resizer-row {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 6px;
      cursor: row-resize;
      z-index: 20;
      user-select: none;
    }

    .resizer-row:hover { border-bottom: 2px solid var(--excel-green); }

    /* --- CLEAN MODE --- */
    .clean-mode .pvtAxisContainer,
    .clean-mode .pvtRenderer,
    .clean-mode .pvtAggregator,
    .clean-mode .pvtAttrDropdown,
    .clean-mode .pvtTriangle,
    .clean-mode .ui-icon,
    .clean-mode .pvtTopLeft,
    .clean-mode thead tr:first-child > th.pvtAxisContainer,
    .clean-mode thead tr:first-child > th.pvtTopLeft {
      display: none !important;
    }

    .clean-mode table.pvtUi {
      display: block;
      padding: 0;
      margin: 0;
    }

    .clean-mode td.pvtRendererArea {
      padding: 0 !important;
      border: none !important;
    }

    .clean-mode .pvtTable th {
      cursor: default;
      background-image: none !important;
    }

    #output .pvtHorizList li {
      display: inline-block !important;
      float: none !important;
    }

    #output .pvtAxisContainer ul.pvtAttrList {
      padding-left: 0 !important;
      margin: 0 !important;
    }

    /* --- KPI ТАБЛИЦА --- */
    #secondary-table-wrap {
      margin-top: 24px;
      width: max-content;
    }

    .derivedTable {
      border-collapse: collapse;
      width: max-content;
      min-width: auto;
    }

    .derivedTable th.metric-label {
      background: var(--excel-blue-dark);
      color: #fff;
      font-weight: 700;
      text-align: left;
      padding-right: 8px;
    }

    .derivedTable th.metric-header-corner {
      background: var(--excel-blue-dark);
      color: #fff;
      font-weight: 700;
      text-align: center;
    }

    .derivedTable th.metric-col-header {
      background: var(--excel-blue-light);
      color: #222;
      font-weight: 700;
      text-align: center;
      vertical-align: middle;
    }

    .derivedTable td.metric-val {
      text-align: center;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }

    .derivedTable td.metric-na {
      background: #f3f3f3 !important;
      color: #999 !important;
      text-shadow: none !important;
    }

    .metric-label-inner {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      max-width: 100%;
      min-width: 0;
    }

    .metric-label-text {
      flex: 0 1 auto;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-target-box {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .metric-target-prefix,
    .metric-target-suffix {
      font-size: 12px;
      color: #fff;
      opacity: 0.95;
    }

    .metric-target-input {
      width: 56px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 4px;
      background: #fff;
      color: #333;
      font-size: 12px;
      padding: 0 6px;
      box-sizing: border-box;
      text-align: right;
      outline: none;
    }

    .metric-target-input:focus {
      border-color: var(--excel-green);
      box-shadow: 0 0 0 2px rgba(22,147,102,0.15);
    }

    .clean-mode .metric-target-box {
      display: none !important;
    }

    /* --- СТРЕЛКИ В ВЕРХНЕЙ PIVOT-ТАБЛИЦЕ --- */
    .pivot-col-header-inner {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      min-width: 0;
      vertical-align: middle;
    }

    .pivot-col-header-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pivot-drill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border: 1px solid var(--excel-border);
      border-radius: 4px;
      background: #fff;
      color: var(--excel-blue-dark);
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      flex: 0 0 auto;
    }

    .pivot-drill-btn:hover {
      background: var(--excel-surface-alt);
      border-color: var(--excel-blue);
      color: var(--excel-blue-dark);
    }

    .pivot-drill-btn:active {
      background: var(--excel-blue-light);
    }

    /* --- ЭКРАН ДЕТАЛИЗАЦИИ НЕДЕЛИ --- */
    #detail-view-root {
      width: max-content;
      min-width: 100%;
    }

    #detail-backbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    #detail-back-btn {
      background: #fff;
      color: var(--excel-blue-dark);
      border: 1px solid var(--excel-border);
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    #detail-back-btn:hover {
      background: var(--excel-surface-alt);
      border-color: var(--excel-blue);
    }

    #detail-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--excel-blue-dark);
    }

    #detail-subtitle {
      font-size: 12px;
      color: #5f6f89;
    }

    .detail-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-empty-msg {
      margin-top: 12px;
      color: #5f6f89;
      font-size: 13px;
    }

    #detail-view-root.detail-mode .pvtTable th,
    #detail-view-root.detail-mode .pvtTable th.pvtAxisLabel,
    #detail-view-root.detail-mode .pvtTable th.pvtRowLabel,
    #detail-view-root.detail-mode .pvtTable th.pvtColLabel,
    #detail-view-root.detail-mode .pvtTable th.pvtTotalLabel {
      background: var(--excel-blue-dark);
      color: #fff;
    }

    #detail-view-root.detail-mode .pvtTable td {
      background: var(--excel-surface);
    }

    #detail-view-root.detail-mode .derivedTable th.metric-label,
    #detail-view-root.detail-mode .derivedTable th.metric-header-corner {
      background: var(--excel-green);
      color: #fff;
    }

    #detail-view-root.detail-mode .derivedTable th.metric-col-header {
      background: var(--excel-blue);
      color: #fff;
    }

    #detail-view-root.detail-mode .metric-target-box {
      background: rgba(255,255,255,0.18);
    }

    #detail-view-root.detail-mode #detail-back-btn {
      background: var(--excel-blue-dark);
      color: #fff;
      border-color: var(--excel-blue-dark);
    }

    #detail-view-root.detail-mode #detail-back-btn:hover {
      background: var(--excel-blue);
      border-color: var(--excel-blue);
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pivottable/2.23.0/pivot.ru.min.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>

<body>
  <div id="toolbar">
    <div class="toolbar-group" id="zoom-controls">
      <span>🔍</span>
      <input type="range" id="zoom-slider" min="0.5" max="1.5" step="0.1" value="1">
      <span id="zoom-val" style="width: 40px;">100%</span>
    </div>

    <div class="toolbar-group">
      <span style="color:#888;">Растянуть всё:</span>
      <div class="global-drag" id="drag-all-cols" title="Зажмите и тяните вправо/влево">↔ Столбцы</div>
      <div class="global-drag" id="drag-all-rows" title="Зажмите и тяните вниз/вверх">↕ Строки</div>
      <button id="toggle-link-widths" type="button" onclick="toggleLinkWidths()">Привязка: выкл</button>
    </div>

    <button id="toggle-mode" onclick="toggleMode()">Настройки</button>
  </div>

  <div id="output">Загрузка...</div>

  <script>
    // -----------------------------
    // СОСТОЯНИЕ
    // -----------------------------
    let rawRecords = [];
    let mappedRecords = [];
    let columnLabels = {};
    let currentTableId = null;

    let isViewOnly = false;
    let areTablesWidthLinked = false;
    let currentZoom = 1;

    let renderInProgress = false;
    let renderPending = false;

    let reloadInFlight = false;
    let lastDataStamp = 0;
    let lastRenderedDataHash = null;   // хэш равных данных, чтобы не ререндерить «попусту»

    let currentMetricTargets = {};
    let currentDerivedResult = null;

    let currentDrilldown = null;

    // Флаги для подавления лишних ререндеров пока пользователь взаимодействует с UI
    let isUserDragging = false;          // тянет колонку/строку
    let pendingScheduleRender = false;   // отложенный ререндер
    let pendingDataReload = false;       // отложенная перезагрузка данных из Grist

    // Сохранённые пользователем размеры (per tableId)
    let savedColumnWidths = [];          // массив ширин по индексу колонки
    let savedRowHeights = [];            // массив высот по индексу строки
    let savedDerivedColumnWidths = [];   // массив ширин KPI-таблицы по индексу колонки
    let savedDerivedRowHeights = [];     // массив высот KPI-таблицы по индексу строки

    let currentPivotConfig = {
      rows: [],
      cols: [],
      vals: [],
      inclusions: {},
      exclusions: {},
      rendererName: "Таблица",
      aggregatorName: "Количество"
    };

    grist.ready({ requiredAccess: 'full' });

    // -----------------------------
    // КОНСТАНТЫ
    // -----------------------------
    const STATUS_FIELD_ALIASES = [
      'СТАТУС ВОРОНКИ',
      'СТАТУС',
      'ЭТАП ВОРОНКИ'
    ];

    const COUNTA_FIELD_ALIASES = [
      'ФИО',
      'FIO',
      'ФИО КАНДИДАТА',
      'КАНДИДАТ',
      'СОТРУДНИК'
    ];

    const DATE_FIELD_ALIASES = [
      'ДАТА',
      'DATE',
      'ДЕНЬ',
      'ДАТА СМЕНЫ',
      'ДАТА ВЫХОДА',
      'ДАТА СОБЕСЕДОВАНИЯ',
      'ДАТА СОЗДАНИЯ',
      'ДАТА РЕГИСТРАЦИИ',
      'ДАТА ОБНОВЛЕНИЯ',
      'ДАТА СТАТУСА'
    ];

    const STATUS_ALIASES = {
      authorized:       ['АВТОРИЗОВАЛСЯ'],
      firstShift:       ['ВЫШЕЛ НА СМЕНУ'],
      lmkUploaded:      ['ЗАГРУЗИЛ ЛМК'],
      passportUploaded: ['ЗАГРУЗИЛ ПАСПОРТ'],
      registeredInPark: ['ЗАРЕГИСТРИРОВАЛИ В ПАРКЕ'],
      lmkExpiring:      ['ЛМК ЗАКАНЧИВАЕТСЯ'],
      lmkExpired:       ['ЛМК ЗАКОНЧИЛАСЬ', 'ЛМК ЗАКОНЧИЛСЯ'],
      shiftAssigned:    ['НАЗНАЧЕНА СМЕНА']
    };

    const STATUS_ALIAS_SETS = Object.fromEntries(
      Object.entries(STATUS_ALIASES).map(([k, arr]) => [k, new Set(arr.map(normalizeLabel))])
    );

    const DEFAULT_METRIC_TARGETS = {
      allEntered:       0.50,
      passportUploaded: 0.50,
      lmkUploaded:      0.25,
      readyToWork:      0.30,
      firstShift:       0.05
    };

    // -----------------------------
    // HELPERS
    // -----------------------------
    async function getTableIdSafe() {
      try { return await grist.getTable().getTableId(); }
      catch (e) { console.warn("Не удалось получить tableId", e); return null; }
    }

    async function getConfigKeyForCurrentTable() {
      const tableId = await getTableIdSafe();
      return tableId ? `pivotConfig:${tableId}` : `pivotConfig`;
    }

    // -----------------------------
    // ЛОКАЛЬНОЕ ХРАНИЛИЩЕ (per-user, per-browser)
    // -----------------------------
    function lsKey(suffix) {
      const tid = currentTableId || 'default';
      return `pivotUI::${tid}::${suffix}`;
    }
    function lsSave(suffix, value) {
      try { localStorage.setItem(lsKey(suffix), JSON.stringify(value)); } catch (e) {}
    }
    function lsLoad(suffix) {
      try {
        const raw = localStorage.getItem(lsKey(suffix));
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function isInteractingNow() {
      if (isUserDragging) return true;
      const ae = document.activeElement;
      if (ae && ae.classList && ae.classList.contains('metric-target-input')) return true;
      return false;
    }

    // Дешёвый хэш для сравнения сырых записей: стабильный пока таблица не меняется.
    function computeRecordsHash(records) {
      if (!Array.isArray(records) || !records.length) return 'empty';
      let h = records.length + ':';
      try { h += Object.keys(records[0]).length + ':'; } catch (e) {}
      const step = Math.max(1, Math.floor(records.length / 25));
      for (let i = 0; i < records.length; i += step) {
        const r = records[i];
        if (!r) continue;
        try {
          const keys = Object.keys(r);
          for (let k = 0; k < keys.length; k++) {
            const v = r[keys[k]];
            h += (v == null ? '' : String(v).slice(0, 12)) + '|';
          }
          h += ';';
        } catch (e) { h += '?;'; }
      }
      return h;
    }

    function sanitizeConfig(savedConfig, fields) {
      const cleanArr = (a) => (Array.isArray(a) ? a.filter(x => fields.includes(x)) : []);
      return {
        ...savedConfig,
        rows: cleanArr(savedConfig.rows),
        cols: cleanArr(savedConfig.cols),
        vals: cleanArr(savedConfig.vals)
      };
    }

    function normalizeMetricTargets(savedTargets) {
      const result = { ...DEFAULT_METRIC_TARGETS };
      if (!savedTargets || typeof savedTargets !== 'object') return result;

      Object.entries(savedTargets).forEach(([key, val]) => {
        const num = Number(val);
        if (Number.isFinite(num) && num >= 0) {
          result[key] = num;
        }
      });
      return result;
    }

    function normalizeLinkedWidthsFlag(savedValue) {
      if (savedValue === undefined || savedValue === null) return false;
      return !!savedValue;
    }

    function getMetricTarget(metricKey) {
      const val = currentMetricTargets?.[metricKey];
      if (Number.isFinite(val) && val >= 0) return val;
      return DEFAULT_METRIC_TARGETS?.[metricKey] ?? null;
    }

    function formatTargetInputValue(value) {
      if (value == null || !Number.isFinite(value)) return '';
      const pct = value * 100;
      let digits = 1;
      if (Math.abs(pct - Math.round(pct)) < 1e-9) digits = 0;
      if (pct > 0 && pct < 10 && Math.abs(pct * 10 - Math.round(pct * 10)) > 1e-9) digits = 2;
      return pct.toFixed(digits).replace('.', ',');
    }

    function parseTargetInputValue(raw) {
      const txt = String(raw ?? '').trim();
      if (!txt) return null;
      const normalized = txt.replace(/\s+/g, '').replace(',', '.');
      const num = Number(normalized);
      if (!Number.isFinite(num) || num < 0) return null;
      return num / 100;
    }

    async function saveMetricTargetsToOptions() {
      // 1) Локально (per-user / per-browser) — основное место хранения целей
      lsSave('metricTargets', currentMetricTargets);

      // 2) Резервно — пишем и в общий конфиг документа,
      //    чтобы новые пользователи видели разумные значения по умолчанию.
      try {
        const key = await getConfigKeyForCurrentTable();
        const config = (await grist.getOption(key)) || {};
        config.metricTargets = currentMetricTargets;
        await grist.setOption(key, config);
      } catch (e) {
        // не критично — локальное хранение уже сработало
      }
    }

    async function saveLinkedWidthsMode() {
      lsSave('linkedWidths', areTablesWidthLinked);

      try {
        const key = await getConfigKeyForCurrentTable();
        const config = (await grist.getOption(key)) || {};
        config.areTablesWidthLinked = areTablesWidthLinked;
        await grist.setOption(key, config);
      } catch (e) {
        // локальное хранение уже сработало
      }
    }

    function recolorMetricRow(metricKey) {
      const target = getMetricTarget(metricKey);
      const wrap = document.getElementById('secondary-table-wrap');
      if (!wrap) return;
      const row = wrap.querySelector(`tr[data-metric-key="${metricKey}"]`);
      if (!row) return;

      row.querySelectorAll('td.metric-val').forEach(td => {
        if (td.classList.contains('metric-na')) return;
        const txt = (td.textContent || '').replace(/\s+/g, '').replace('%', '').replace(',', '.');
        const num = parseFloat(txt);
        if (Number.isFinite(num)) {
          td.style.backgroundColor = getHeatColorByTarget(num / 100, target);
          td.style.color = '#fff';
        }
      });
    }

    async function handleMetricTargetCommit(metricKey, inputEl) {
      const parsed = parseTargetInputValue(inputEl.value);
      const fallback = DEFAULT_METRIC_TARGETS[metricKey];

      currentMetricTargets[metricKey] =
        (parsed != null && Number.isFinite(parsed)) ? parsed : fallback;

      inputEl.value = formatTargetInputValue(currentMetricTargets[metricKey]);

      // Сохраняем синхронно локально, асинхронно в Grist — без полного ререндера,
      // чтобы фокус ввода не терялся и значение не «откатывалось».
      saveMetricTargetsToOptions();
      recolorMetricRow(metricKey);
    }

    function updateLinkWidthsButton() {
      const btn = document.getElementById('toggle-link-widths');
      if (!btn) return;

      if (areTablesWidthLinked) {
        btn.textContent = 'Привязка: вкл';
        btn.style.backgroundColor = '#169366';

    function normalizeLabel(v) {
      return String(v ?? '')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase()
        .replace(/Ё/g, 'Е');
    }

    function safeDiv(a, b) {
      return (b === 0 || b == null || !Number.isFinite(b)) ? null : a / b;
    }

    function formatPercentRU(value, digits = 2) {
      if (value == null || !Number.isFinite(value)) return '—';
      return (value * 100).toFixed(digits).replace('.', ',') + '%';
    }

    function formatHeaderValue(v) {
      if (v === null || v === undefined || v === '') return '—';
      if (v instanceof Date) return v.toLocaleDateString('ru-RU');
      return String(v);
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      return {
        r: parseInt(clean.substring(0, 2), 16),
        g: parseInt(clean.substring(2, 4), 16),
        b: parseInt(clean.substring(4, 6), 16)
      };
    }

    function mixColors(c1, c2, t) {
      const a = hexToRgb(c1);
      const b = hexToRgb(c2);
      const lerp = (x, y) => Math.round(x + (y - x) * t);
      return `rgb(${lerp(a.r, b.r)}, ${lerp(a.g, b.g)}, ${lerp(a.b, b.b)})`;
    }

    async function loadColumnLabelsForCurrentTable() {
      columnLabels = {};
      try {
        const tableId = await getTableIdSafe();
        if (!tableId) return;

        const tables = await grist.docApi.fetchTable('_grist_Tables');
        const nT = (tables.tableId || []).length;

        let tableRef = null;
        for (let i = 0; i < nT; i++) {
          if (tables.tableId[i] === tableId) {
            tableRef = tables.id[i];
            break;
          }
        }
        if (!tableRef) return;

        const cols = await grist.docApi.fetchTable('_grist_Tables_column');
        const nC = (cols.colId || []).length;

        for (let i = 0; i < nC; i++) {
          if (cols.parentId?.[i] !== tableRef) continue;
          const colId = cols.colId[i];
          const label = cols.label?.[i] || colId;
          if (colId) columnLabels[colId] = label;
        }
      } catch (e) {
        console.warn("Не удалось загрузить labels (будут colId)", e);
      }
    }

    function mapRecordsWithLabels(records) {
      return (records || []).map(rec => {
        const cleanRow = {};
        Object.keys(rec).forEach(key => {
          if (key === 'id' || key === 'manualSort') return;
          const label = columnLabels[key] || key;
          cleanRow[label] = rec[key];
        });
        return cleanRow;
      });
    }

    async function ensureTableContextUpToDate() {
      const tableId = await getTableIdSafe();

      if (currentTableId !== tableId) {

    }

    function scheduleRender() {
      // Пока пользователь тянет колонку/строку или печатает в поле цели —
      // откладываем ререндер, иначе форма таблицы «слетает» и ввод теряется.
      if (isInteractingNow()) {
        pendingScheduleRender = true;
        return;
      }
      if (renderInProgress) {
        renderPending = true;
        return;
      }
      renderPivot();
    }

    function flushPendingAfterInteraction() {
      if (isInteractingNow()) return;
      if (pendingDataReload) {
        pendingDataReload = false;
        forceReloadFromGrist('flush_after_interaction');
        return;
      }
      if (pendingScheduleRender) {
        pendingScheduleRender = false;
        scheduleRender();
      }
    }

    function findFieldByAliases(fields, aliases) {
      const lookup = new Map(fields.map(f => [normalizeLabel(f), f]));
      for (const alias of aliases) {
        const found = lookup.get(normalizeLabel(alias));
        if (found) return found;
      }
      return null;
    }

    function normalizeComparableValue(v) {
      if (v === null || v === undefined) return 'null';
      if (typeof v === 'number' || typeof v === 'boolean') return String(v);
      if (v instanceof Date) return String(v.getTime());
      if (typeof v === 'object') {
        try { return JSON.stringify(v); } catch (e) { return String(v); }
      }
      return String(v);
    }

    function collectionToComparableSet(coll) {
      const out = new Set();
      if (!coll) return out;

      if (Array.isArray(coll)) {
        coll.forEach(v => out.add(normalizeComparableValue(v)));
        return out;
      }

      if (typeof coll === 'object') {
        Object.keys(coll).forEach(k => out.add(normalizeComparableValue(k)));
        return out;
      }

      out.add(normalizeComparableValue(coll));
      return out;
    }

    function recordMatchesPivotFilters(record, config) {
      const inclusions = config?.inclusions || {};
      const exclusions = config?.exclusions || {};

      for (const [field, allowed] of Object.entries(inclusions)) {
        const allowedSet = collectionToComparableSet(allowed);
        if (!allowedSet.size) continue;

        const recVal = normalizeComparableValue(record[field]);
        if (!allowedSet.has(recVal)) return false;
      }

      for (const [field, blocked] of Object.entries(exclusions)) {
        const blockedSet = collectionToComparableSet(blocked);
        if (!blockedSet.size) continue;

        const recVal = normalizeComparableValue(record[field]);
        if (blockedSet.has(recVal)) return false;
      }

      return true;
    }

    function naturalCompare(a, b) {
      const nat = $.pivotUtilities?.naturalSort;
      if (typeof nat === 'function') return nat(a, b);

      return String(a ?? '').localeCompare(String(b ?? ''), 'ru', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    // ВАЖНО:
    // больше НЕ пытаемся парсить произвольные строки "50", "51", "52" как даты.
    // Иначе недели ломают порядок.
    function parseMaybeDate(v) {
      if (v == null || v === '') return null;

      if (v instanceof Date && !isNaN(v.getTime())) return v;

      if (typeof v === 'number' && Number.isFinite(v) && v > 1e11) {
        const d = new Date(v);
        if (!isNaN(d.getTime())) return d;
        return null;
      }

      const s = String(v).trim();
      if (!s) return null;

      let m = s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{2,4})$/);
      if (m) {
        let dd = Number(m[1]);
        let mm = Number(m[2]) - 1;
        let yyyy = Number(m[3]);
        if (yyyy < 100) yyyy += 2000;
        const d = new Date(yyyy, mm, dd);
        if (!isNaN(d.getTime())) return d;
      }

      m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:[T\s].*)?$/);
      if (m) {
        const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        if (!isNaN(d.getTime())) return d;
      }

      m = s.match(/^(\d{4})[./](\d{1,2})[./](\d{1,2})$/);
      if (m) {
        const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        if (!isNaN(d.getTime())) return d;
      }

      return null;
    }

    function compareValuesMaybeDate(a, b) {
      const da = parseMaybeDate(a);
      const db = parseMaybeDate(b);
      if (da && db) return da.getTime() - db.getTime();
      return naturalCompare(a, b);
    }

    function sortKeyArrays(keys) {
      return [...keys].sort((ka, kb) => {
        const len = Math.max(ka.length, kb.length);
        for (let i = 0; i < len; i++) {
          const cmp = compareValuesMaybeDate(ka[i], kb[i]);
          if (cmp !== 0) return cmp;
        }
        return 0;
      });
    }

    function isCountaValue(v) {
      if (v === null || v === undefined) return false;
      if (typeof v === 'string') return v.trim() !== '';
      return true;
    }

    function makeCountaAggregatorForField(fieldName, formatter) {
      return function() {
        return function(data, rowKey, colKey) {
          let count = 0;
          return {
            push(record) {
              if (isCountaValue(record[fieldName])) count++;
            },
            value() { return count; },
            format: formatter || (x => String(x)),
            numInputs: 0
          };
        };
      };
    }

    function isLikelyDateFieldName(fieldName) {
      const n = normalizeLabel(fieldName);
      return n.includes('ДАТ') || n.includes('DATE') || n.includes('ДЕНЬ') || n.includes('DAY');
    }

    function fieldLooksLikeDate(fieldName, records) {
      const sample = [];
      for (const rec of records || []) {
        const v = rec[fieldName];
        if (v == null || v === '') continue;
        sample.push(v);
        if (sample.length >= 15) break;
      }
      if (!sample.length) return false;
      const parsedCount = sample.filter(v => !!parseMaybeDate(v)).length;
      return parsedCount / sample.length >= 0.6;
    }

    function findBestDateField(fields, records) {
      const aliasHit = findFieldByAliases(fields, DATE_FIELD_ALIASES);
      if (aliasHit) return aliasHit;

      const likelyByName = fields.find(isLikelyDateFieldName);
      if (likelyByName && fieldLooksLikeDate(likelyByName, records)) return likelyByName;

      const likelyByContent = fields.find(f => fieldLooksLikeDate(f, records));
      return likelyByContent || null;
    }

    function recordMatchesKeyArray(rec, fields, keyArr) {
      if (!Array.isArray(fields) || !Array.isArray(keyArr)) return false;
      if (fields.length !== keyArr.length) return false;

      for (let i = 0; i < fields.length; i++) {
        if (normalizeComparableValue(rec[fields[i]] ?? null) !== normalizeComparableValue(keyArr[i] ?? null)) {
          return false;
        }
      }
      return true;
    }

    // -----------------------------
    // ПАЛИТРА KPI
    // -----------------------------
    const KPI_HEAT_STOPS = [
      { t: 0.00, color: '#de6b6b' },
      { t: 0.25, color: '#e6a05f' },
      { t: 0.50, color: '#efd46d' },
      { t: 0.75, color: '#a9bf58' },
      { t: 1.00, color: '#54aa69' }
    ];

    function interpolateMultiStopColor(stops, t) {
      const clamped = Math.max(0, Math.min(1, t));

      if (clamped <= stops[0].t) return stops[0].color;
      if (clamped >= stops[stops.length - 1].t) return stops[stops.length - 1].color;

      for (let i = 0; i < stops.length - 1; i++) {
        const left = stops[i];
        const right = stops[i + 1];

        if (clamped >= left.t && clamped <= right.t) {
          const span = right.t - left.t || 1;
          const localT = (clamped - left.t) / span;
          return mixColors(left.color, right.color, localT);
        }
      }

      return stops[stops.length - 1].color;
    }

    function getHeatColorByTarget(value, target) {
      if (value == null || !Number.isFinite(value)) return '#f3f3f3';

      const t = Number(target);
      if (!Number.isFinite(t) || t <= 0) {
        return interpolateMultiStopColor(KPI_HEAT_STOPS, 0.5);
      }

      const ratio = Math.max(0, Math.min(1, value / t));
      const adjusted = Math.pow(ratio, 1.15);

      return interpolateMultiStopColor(KPI_HEAT_STOPS, adjusted);
    }

    // -----------------------------
    // KPI ЛОГИКА
    // -----------------------------
    function createCounterBucket() {
      return {
        total: 0,
        authorized: 0,
        firstShift: 0,
        lmkUploaded: 0,
        passportUploaded: 0,
        registeredInPark: 0,
        lmkExpiring: 0,
        lmkExpired: 0,
        shiftAssigned: 0
      };
    }

    function incrementBucket(bucket, normalizedStatus) {
      bucket.total += 1;

      if (STATUS_ALIAS_SETS.authorized.has(normalizedStatus))       bucket.authorized += 1;
      if (STATUS_ALIAS_SETS.firstShift.has(normalizedStatus))       bucket.firstShift += 1;
      if (STATUS_ALIAS_SETS.lmkUploaded.has(normalizedStatus))      bucket.lmkUploaded += 1;
      if (STATUS_ALIAS_SETS.passportUploaded.has(normalizedStatus)) bucket.passportUploaded += 1;
      if (STATUS_ALIAS_SETS.registeredInPark.has(normalizedStatus)) bucket.registeredInPark += 1;
      if (STATUS_ALIAS_SETS.lmkExpiring.has(normalizedStatus))      bucket.lmkExpiring += 1;
      if (STATUS_ALIAS_SETS.lmkExpired.has(normalizedStatus))       bucket.lmkExpired += 1;
      if (STATUS_ALIAS_SETS.shiftAssigned.has(normalizedStatus))    bucket.shiftAssigned += 1;
    }

    function makeMetricsFromBuckets(orderedBuckets) {
      return [
        {
          key: 'allEntered',
          label: '% всех кто зашел',
          digits: 1,
          values: orderedBuckets.map(b => safeDiv(b.total - b.registeredInPark, b.total))
        },
        {
          key: 'passportUploaded',
          label: '% загрузил паспорт',
          digits: 2,
          values: orderedBuckets.map(b => safeDiv(b.passportUploaded, b.total - b.registeredInPark))
        },
        {
          key: 'lmkUploaded',
          label: '% загрузил ЛМК',
          digits: 2,
          values: orderedBuckets.map(b =>
            safeDiv(
              b.firstShift + b.lmkUploaded + b.lmkExpiring + b.lmkExpired + b.shiftAssigned,
              b.total - b.registeredInPark
            )
          )
        },
        {
          key: 'readyToWork',
          label: '% готовых к работе',
          digits: 2,
          values: orderedBuckets.map(b =>
            safeDiv(
              b.total - b.authorized - b.registeredInPark,
              b.total
            )
          )
        },
        {
          key: 'firstShift',
          label: '% первая смена',
          digits: 2,
          values: orderedBuckets.map(b => safeDiv(b.firstShift, b.total))
        }
      ];
    }

    function buildDerivedMetricsGrouped(records, config, groupFields = [], extraRecordFilter = null) {
      if (!records || !records.length) return null;

      const fields = Object.keys(records[0] || {});
      const statusField = findFieldByAliases(fields, STATUS_FIELD_ALIASES);
      if (!statusField) return null;

      const countaField = findFieldByAliases(fields, COUNTA_FIELD_ALIASES);

      const filteredRecords = records.filter(rec => {
        if (!recordMatchesPivotFilters(rec, config)) return false;
        if (typeof extraRecordFilter === 'function' && !extraRecordFilter(rec)) return false;
        return true;
      });

      const grandBucket = createCounterBucket();
      const byKey = new Map();

      const getKeyArr = (rec) => groupFields.map(f => rec[f] ?? null);
      const keyToString = (arr) => JSON.stringify(arr);

      const ensureBucket = (keyArr) => {
        const key = keyToString(keyArr);
        if (!byKey.has(key)) byKey.set(key, createCounterBucket());
        return byKey.get(key);
      };

      for (const rec of filteredRecords) {
        if (countaField && !isCountaValue(rec[countaField])) continue;

        const normalizedStatus = normalizeLabel(rec[statusField]);
        incrementBucket(grandBucket, normalizedStatus);

        if (groupFields.length > 0) {
          incrementBucket(ensureBucket(getKeyArr(rec)), normalizedStatus);
        }
      }

      let orderedBuckets = [];
      let colLabels = [];
      let colKeys = [];

      if (groupFields.length > 0) {
        const orderedKeys = sortKeyArrays(
          Array.from(byKey.keys()).map(k => JSON.parse(k))
        );

        orderedBuckets = orderedKeys.map(keyArr => byKey.get(keyToString(keyArr)) || createCounterBucket());
        colLabels = orderedKeys.map(keyArr => keyArr.map(formatHeaderValue).join(' / '));
        colKeys = orderedKeys.map(keyArr => keyArr);

        orderedBuckets.push(grandBucket);
        colLabels.push('Итого');
        colKeys.push(null);
      } else {
        orderedBuckets = [grandBucket];
        colLabels = ['Итого'];
        colKeys = [null];
      }

      return {
        metrics: makeMetricsFromBuckets(orderedBuckets),
        colCount: orderedBuckets.length,
        colLabels,
        colKeys,
        colFields: groupFields
      };
    }

    function buildDerivedMetricsFromRecords(records, config) {
      if (!records || !records.length) return null;
      const fields = Object.keys(records[0] || {});
      const colFields = Array.isArray(config?.cols)
        ? config.cols.filter(f => fields.includes(f))
        : [];
      return buildDerivedMetricsGrouped(records, config, colFields);
    }

    // -----------------------------
    // HELPERS ДЛЯ ПОРЯДКА КОЛОНОК
    // -----------------------------
    function getMainRendererArea() {
      return document.querySelector('#output .pvtRendererArea');
    }

    // -----------------------------
    // СОХРАНЕНИЕ / ВОССТАНОВЛЕНИЕ РУЧНЫХ РАЗМЕРОВ
    // -----------------------------
    function getMainPivotTable() {
      const area = getMainRendererArea();
      if (!area) return null;
      return area.querySelector('.pvtTable:not(.derivedTable)');
    }

    function getDerivedPivotTable() {
      return document.querySelector('#secondary-table-wrap .derivedTable');
    }

    function getWidestTableRow(table) {
      if (!table) return null;

      const allRows = Array.from(table.querySelectorAll('tr'));
      let bestRow = null;

      for (const tr of allRows) {
        if (!bestRow || tr.children.length > bestRow.children.length) bestRow = tr;
      }

      return bestRow;
    }

    function getTableColumnWidths(table) {
      const bestRow = getWidestTableRow(table);
      if (!bestRow) return [];

      return Array.from(bestRow.children).map(
        c => Math.round(c.getBoundingClientRect().width / currentZoom)
      );
    }

    function applyColumnWidthsToTable(table, widths) {
      if (!table || !Array.isArray(widths) || !widths.length) return;

      const allRows = Array.from(table.querySelectorAll('tr'));
      for (const tr of allRows) {
        const cells = Array.from(tr.children);
        cells.forEach((cell, idx) => {
          const width = widths[idx];
          if (!Number.isFinite(width) || width <= 20) return;
          cell.style.width = `${width}px`;
          cell.style.minWidth = `${width}px`;
          cell.style.maxWidth = `${width}px`;
        });
      }
    }

    function getFirstColumnWidth(table) {
      const widths = getTableColumnWidths(table);
      const width = widths[0];
      return (Number.isFinite(width) && width > 20) ? width : null;
    }

    function getMainLeftBlockCells(row) {
      if (!row) return [];

      const cells = Array.from(row.children);
      const leftCells = [];

      for (const cell of cells) {
        if (cell.tagName === 'TD') break;
        if (cell.classList?.contains('pvtColLabel')) break;
        leftCells.push(cell);
      }

      return leftCells;
    }

    function getMainLeftBlockWidth(table) {
      if (!table) return null;

      const rows = Array.from(table.querySelectorAll('thead tr, tbody tr'));
      let maxWidth = null;

      rows.forEach(row => {
        const cells = getMainLeftBlockCells(row);
        if (!cells.length) return;

        const totalWidth = cells.reduce(
          (sum, cell) => sum + (cell.getBoundingClientRect().width / currentZoom),
          0
        );

        if (Number.isFinite(totalWidth) && totalWidth > 0) {
          maxWidth = Math.max(maxWidth || 0, totalWidth);
        }
      });

      return maxWidth;
    }

    function applyFirstColumnWidth(table, width) {
      if (!table || !Number.isFinite(width) || width <= 20) return;

      const rows = Array.from(table.querySelectorAll('tr'));
      rows.forEach(tr => {
        const cell = tr.children[0];
        if (!cell) return;
        cell.style.width = `${width}px`;
        cell.style.minWidth = `${width}px`;
        cell.style.maxWidth = `${width}px`;
      });
    }

    function applyMainLeftBlockWidth(table, targetWidth) {
      if (!table || !Number.isFinite(targetWidth) || targetWidth <= 20) return;

      const rows = Array.from(table.querySelectorAll('thead tr, tbody tr'));
      rows.forEach(row => {
        const cells = getMainLeftBlockCells(row);
        if (!cells.length) return;

        const currentWidths = cells.map(cell => Math.max(30, cell.getBoundingClientRect().width / currentZoom));
        const currentTotal = currentWidths.reduce((sum, width) => sum + width, 0);

        let nextWidths;
        if (cells.length === 1 || !Number.isFinite(currentTotal) || currentTotal <= 0) {
          nextWidths = [targetWidth];
        } else {
          const scale = targetWidth / currentTotal;
          nextWidths = currentWidths.map((width, idx) => {
            if (idx === currentWidths.length - 1) return null;
            return Math.max(30, Math.round(width * scale));
          });

          const assigned = nextWidths.reduce((sum, width) => sum + (width || 0), 0);
          nextWidths[currentWidths.length - 1] = Math.max(30, targetWidth - assigned);
        }

        cells.forEach((cell, idx) => {
          const width = nextWidths[idx];
          if (!Number.isFinite(width) || width <= 20) return;
          cell.style.width = `${width}px`;
          cell.style.minWidth = `${width}px`;
          cell.style.maxWidth = `${width}px`;
        });
      });
    }

    function getLinkedLabelWidth(fallbackWidth) {
      const currentDerivedWidth = getFirstColumnWidth(getDerivedPivotTable());
      if (Number.isFinite(currentDerivedWidth) && currentDerivedWidth > 20) {
        return currentDerivedWidth;
      }

      const savedDerivedWidth = Array.isArray(savedDerivedColumnWidths)
        ? savedDerivedColumnWidths[0]
        : null;

      if (Number.isFinite(savedDerivedWidth) && savedDerivedWidth > 20) {
        return savedDerivedWidth;
      }

      return fallbackWidth;
    }

    function captureAndSaveColumnWidths() {
      const table = getMainPivotTable();
      if (!table) return;

      // Берём самую широкую строку (по числу ячеек) — это реальная сетка.
      const widths = getTableColumnWidths(table);
      if (!widths.length) return;

      savedColumnWidths = widths;
      lsSave('columnWidths', widths);
